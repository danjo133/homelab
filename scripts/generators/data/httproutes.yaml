# HTTPRoute definitions for Gateway API ingress
# Auto-discovered by gateway templates — each entry generates an HTTPRoute resource
#
# Fields:
#   name:        HTTPRoute metadata.name and resource filename stem
#   filename:    Output filename (overrides default of "<name>-httproute.yaml")
#   namespace:   Kubernetes namespace for the HTTPRoute
#   hostname:    Subdomain prefix (prepended to cluster domain)
#   serviceName: Backend service name
#   servicePort: Backend service port
#   pathPrefix:  URL path prefix (default: /)
#   portal:      Portal annotations (omit to skip portal annotations)
#     name:        Display name
#     description: Short description
#     icon:        Unicode emoji
#     category:    Portal category
#     order:       Sort order within category

routes:
  - name: argocd
    filename: argocd-httproute.yaml
    namespace: argocd
    hostname: argocd
    serviceName: argocd-server
    servicePort: 80
    portal:
      name: "ArgoCD"
      description: "GitOps continuous delivery"
      icon: "\U0001F680"
      category: "Platform"
      order: "10"

  - name: keycloak
    filename: keycloak-httproute.yaml
    namespace: keycloak
    hostname: auth
    serviceName: broker-keycloak-service
    servicePort: 8080
    portal:
      name: "Keycloak"
      description: "Broker identity provider"
      icon: "\U0001F511"
      category: "Identity"
      order: "10"

  - name: grafana
    filename: grafana-httproute.yaml
    namespace: monitoring
    hostname: grafana
