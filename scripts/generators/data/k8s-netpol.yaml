# Kubernetes NetworkPolicy definitions for Canal CNI clusters
# Used by: templates/kustomize/network-egress/k8s/

# Namespaces that get the default-deny + baseline allow policy
defaultPolicyNamespaces:
  - kube-system
  - argocd
  - cert-manager
  - external-secrets
  - external-dns
  - metallb-system
  - ingress-nginx
  - monitoring
  - beyla-system
  - longhorn-system
  - gatekeeper-system
  - spire-system
  - cnpg-system
  - ziti-system
  - teleport
  - keycloak
  - keycloak-operator
  - oauth2-proxy
  - identity
  - headlamp
  - globalpulse
  - kube-public
  - vault-auth
  - apps
  - trivy-system

# Namespaces that get internet egress access
internetNamespaces:
  - cert-manager
  - external-dns
  - argocd
