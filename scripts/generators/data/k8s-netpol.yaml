# Kubernetes NetworkPolicy definitions for Canal CNI clusters
# Used by: templates/kustomize/network-egress/k8s/

# Namespaces that get the default-deny + baseline allow policy
defaultPolicyNamespaces:
  - kube-system
  - argocd
  - cert-manager
  - external-secrets
  - external-dns
  - metallb-system
  - ingress-nginx
  - monitoring
  - beyla-system
  - longhorn-system
  - gatekeeper-system
  - spire-system
  - cnpg-system
  - ziti-system
  - teleport
  - keycloak
  - keycloak-operator
  - oauth2-proxy
  - identity
  - headlamp
  - globalpulse
  - kube-public
  - vault-auth
  - trivy-system
  - crowdsec
  - dependency-track

# Namespaces running admission webhooks — need API server ingress
# (host-network traffic uses flannel source IPs outside namespaceSelector match)
webhookNamespaces:
  - namespace: cert-manager
    port: 10250
  - namespace: cnpg-system
    port: 9443
  - namespace: external-secrets
    port: 10250
  - namespace: gatekeeper-system
    port: 8443
  - namespace: longhorn-system
    port: 9502
  - namespace: metallb-system
    port: 9443
  - namespace: monitoring
    port: 10250
  - namespace: spire-system
    port: 9443

# Namespaces that get internet egress access
internetNamespaces:
  - cert-manager
  - external-dns
  - argocd
  - crowdsec
  - dependency-track
