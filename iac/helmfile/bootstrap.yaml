# Helmfile for Kubernetes cluster bootstrap
# This file defines the initial Helm releases for cluster setup
# Install in order: Cilium -> Tetragon -> cert-manager -> external-secrets -> ArgoCD -> Nginx

helmDefaults:
  atomic: true
  cleanupOnFail: true
  timeout: 600
  wait: true

releases:
  # Cilium - Container Network Interface
  - name: cilium
    namespace: kube-system
    createNamespace: true
    repo: https://helm.cilium.io
    chart: cilium
    version: "1.14.x"  # Update with latest stable version
    values:
      - ./values/cilium.yaml
    hooks:
      postInstall:
        showlogs: true
      postUpgrade:
        showlogs: true

  # Tetragon - Pod Security & Runtime Threat Detection
  - name: tetragon
    namespace: kube-system
    createNamespace: true
    repo: https://helm.cilium.io
    chart: tetragon
    version: "0.11.x"  # Update with latest stable version
    values:
      - ./values/tetragon.yaml
    depends:
      - kube-system/cilium

  # cert-manager - Certificate Management
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    repo: https://charts.jetstack.io
    chart: cert-manager
    version: "v1.13.x"  # Update with latest stable version
    values:
      - ./values/cert-manager.yaml
    hooks:
      postInstall:
        showlogs: true

  # external-secrets - Secret Synchronization from Vault
  - name: external-secrets
    namespace: external-secrets
    createNamespace: true
    repo: https://charts.external-secrets.io
    chart: external-secrets
    version: "0.9.x"  # Update with latest stable version
    values:
      - ./values/external-secrets.yaml
    depends:
      - cert-manager/cert-manager

  # ArgoCD - GitOps Continuous Deployment
  - name: argocd
    namespace: argocd
    createNamespace: true
    repo: https://argoproj.github.io/argo-helm
    chart: argo-cd
    version: "5.48.x"  # Update with latest stable version
    values:
      - ./values/argocd.yaml
    depends:
      - external-secrets/external-secrets

  # Nginx Ingress Controller
  - name: nginx-ingress
    namespace: ingress-nginx
    createNamespace: true
    repo: https://helm.nginx.com/stable
    chart: nginx-ingress
    version: "0.18.x"  # Update with latest stable version
    values:
      - ./values/nginx-ingress.yaml
    depends:
      - kube-system/cilium

---
