# ArgoCD Helm Values
# GitOps continuous deployment

# Image configuration
image:
  tag: null  # Use default from chart

# ArgoCD server
server:
  autoscaling:
    enabled: false
  replicas: 1

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  # Ingress for ArgoCD UI
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.simple-k8s.example.com
    tls: true

  # Ingress/config handled via configs.cm below

# ArgoCD config (argo-cd chart 7.x uses configs.* instead of server.config/rbacConfig)
configs:
  params:
    server.insecure: true
  cm:
    url: "https://argocd.simple-k8s.example.com"
    oidc.config: |
      name: Keycloak
      issuer: https://auth.simple-k8s.example.com/realms/broker
      clientID: argocd
      clientSecret: $argocd-oidc-secret:client-secret
      requestedScopes:
        - openid
        - profile
        - email
        - groups

  rbac:
    policy.csv: |
      # Map Keycloak groups to ArgoCD roles
      g, oidc:platform-admins, role:admin
      g, oidc:k8s-admins, role:admin
      g, oidc:web-admins, role:admin
      g, oidc:k8s-operators, role:readonly
      g, oidc:web-operators, role:readonly
    policy.default: role:readonly
    scopes: '[groups]'

# ArgoCD repository server
repoServer:
  autoscaling:
    enabled: false
  replicas: 1
  
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ArgoCD controller
controller:
  replicas: 1
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ArgoCD application controller
applicationController:
  replicas: 1

# ArgoCD notifications
notifications:
  enabled: false
  # Configure notification providers (Slack, email, etc)

# Redis
redis:
  enabled: true
  replica:
    enabled: false

# RBAC
rbac:
  create: true

# Service account
serviceAccount:
  create: true
  name: argocd-server

# Global configuration
global:
  logging:
    level: info
    format: json

# Install CRDs
installCRDs: true

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # Enable if using Prometheus Operator

# High availability mode
ha:
  enabled: false  # Enable for production HA setup
