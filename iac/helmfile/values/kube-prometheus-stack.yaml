# kube-prometheus-stack Helm Values
# Chart: prometheus-community/kube-prometheus-stack
#
# All-in-one monitoring: Prometheus, Grafana, AlertManager,
# node-exporter, kube-state-metrics, and default dashboards.

# ============================================================================
# Prometheus
# ============================================================================
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    # Scrape all ServiceMonitors regardless of labels
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# ============================================================================
# Grafana
# ============================================================================
grafana:
  enabled: true
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.simple-k8s.example.com
    tls:
      - secretName: wildcard-simple-k8s.example.com-tls
        hosts:
          - grafana.simple-k8s.example.com

  # Admin password from existing secret (populated by ExternalSecret)
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  # Keycloak OIDC authentication
  grafana.ini:
    server:
      root_url: "https://grafana.simple-k8s.example.com"
    auth:
      disable_login_form: false
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      auto_login: false
      client_id: grafana
      client_secret: "${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
      scopes: openid profile email groups
      auth_url: "https://auth.simple-k8s.example.com/realms/broker/protocol/openid-connect/auth"
      token_url: "https://auth.simple-k8s.example.com/realms/broker/protocol/openid-connect/token"
      api_url: "https://auth.simple-k8s.example.com/realms/broker/protocol/openid-connect/userinfo"
      role_attribute_path: "contains(groups[*], 'platform-admins') && 'Admin' || contains(groups[*], 'web-admins') && 'Admin' || contains(groups[*], 'web-operators') && 'Viewer' || 'Viewer'"
      role_attribute_strict: false

  # Inject OIDC client secret from ExternalSecret
  envFromSecrets:
    - name: grafana-oidc-secret
      optional: true

  # Loki data source (provisioned automatically)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: utc

# ============================================================================
# AlertManager
# ============================================================================
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  # No receivers configured yet — add Slack/email later
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
    receivers:
      - name: "null"

# ============================================================================
# node-exporter (DaemonSet on all nodes)
# ============================================================================
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
  tolerations:
    - operator: Exists

# ============================================================================
# kube-state-metrics
# ============================================================================
kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

# ============================================================================
# Component scraping
# ============================================================================
kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: false  # RKE2 uses static pods, metrics may not be reachable
kubeScheduler:
  enabled: false  # Same as above
kubeEtcd:
  enabled: false  # RKE2 embeds etcd, not easily scrapeable
kubeProxy:
  enabled: false  # Using kube-proxy replacement or Canal
kubelet:
  enabled: true
coreDns:
  enabled: true
