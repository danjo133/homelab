# Istio Ingress Gateway Values
# Configures the Istio ingress gateway for external traffic
#
# This gateway will receive a LoadBalancer IP from Cilium's IP pool,
# which BGP will advertise to the upstream router.

# =============================================================================
# Service Configuration
# =============================================================================

service:
  # LoadBalancer service type - Cilium will allocate an IP from the pool
  # BGP will advertise this IP to the router for external access
  type: LoadBalancer

  # Ports exposed by the gateway
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443

  # External traffic policy - Local preserves client IP
  externalTrafficPolicy: Local

# =============================================================================
# Deployment Configuration
# =============================================================================

# Number of gateway replicas
replicaCount: 1

# Disable autoscaling for homelab
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1

# Resource requests/limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# =============================================================================
# Pod Configuration
# =============================================================================

# Run on any node
nodeSelector: {}

# Tolerations
tolerations: []

# Pod affinity
affinity: {}

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  create: true
