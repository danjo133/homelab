# Istio Control Plane (istiod) Values
# Configures the Istio control plane for service mesh functionality
#
# Key features:
# - Automatic sidecar injection
# - mTLS between services
# - Telemetry and observability

# =============================================================================
# Scaling Configuration
# =============================================================================

# Disable autoscaling for homelab (single replica is sufficient)
autoscaleEnabled: false
replicaCount: 1

# Resource requests/limits appropriate for homelab
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# =============================================================================
# Mesh Configuration
# =============================================================================

meshConfig:
  # Access logging for debugging and observability
  accessLogFile: /dev/stdout

  # Enable tracing (compatible with Jaeger/Zipkin when deployed)
  enableTracing: true

  # Enable Prometheus metrics merge
  enablePrometheusMerge: true

  # Default proxy configuration
  defaultConfig:
    # Enable DNS capture for better service discovery
    proxyMetadata:
      ISTIO_META_DNS_CAPTURE: "true"
      ISTIO_META_DNS_AUTO_ALLOCATE: "true"

    # Tracing sample rate (1% for production, increase for debugging)
    tracing:
      sampling: 1.0

    # Hold application start until proxy is ready
    holdApplicationUntilProxyStarts: true

  # Outbound traffic policy: ALLOW_ANY lets pods reach external services
  # Use REGISTRY_ONLY to restrict to only registered services
  outboundTrafficPolicy:
    mode: ALLOW_ANY

# =============================================================================
# Global Settings
# =============================================================================

global:
  # Use istio-system as the namespace
  istioNamespace: istio-system

  # Proxy (sidecar) resource configuration
  proxy:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Log level (debug, info, warning, error)
    logLevel: warning

  # Proxy init container resources
  proxy_init:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  # Logging level
  logging:
    level: "default:info"

# =============================================================================
# Sidecar Injection
# =============================================================================

sidecarInjectorWebhook:
  # Don't enable injection by default - require namespace label
  enableNamespacesByDefault: false

  # Rewrite probes to go through the sidecar
  rewriteAppHTTPProbe: true

# =============================================================================
# Telemetry
# =============================================================================

telemetry:
  enabled: true
  v2:
    # Enable Prometheus metrics
    prometheus:
      enabled: true

# =============================================================================
# Environment Variables
# =============================================================================

env:
  # Enable status updates for Gateway API resources
  PILOT_ENABLE_STATUS: "true"
  # Enable Gateway API support
  PILOT_ENABLE_GATEWAY_API: "true"
  PILOT_ENABLE_GATEWAY_API_STATUS: "true"
  PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER: "true"
