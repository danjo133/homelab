# Cilium CNI Helm Values
# Container Network Interface with networking policies and security

# Image configuration
image:
  repository: quay.io/cilium/cilium
  tag: null  # Use default from chart
  useDigest: true

# Cilium agent configuration
agent: true
config:
  # Enable IP routing
  ipam: kubernetes
  
  # Enable Cilium NetworkPolicy
  enableCiliumNetworkPolicy: true
  
  # Enable service mesh (optional)
  l7Proxy: true
  
  # Prometheus metrics
  prometheus: true
  
  # MTU configuration
  mtu: 1500

# RBAC
rbac:
  create: true

# Service account
serviceAccount:
  create: true
  name: cilium

# Pod security policy
podSecurityPolicy:
  enabled: false

# Network policies
networkPolicy:
  enabled: true

# BGP routing (for Unifi router integration)
bgp:
  enabled: false  # Enable if Unifi router supports BGP
  # announcement:
  #   loadBalancerIPs: true

# Performance settings
replicas: 1
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Resources
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Monitoring
prometheus:
  enabled: true
  port: 9090
  metrics:
    - controlplane
    - operator
    - hubble

# Node selector (optional, for node affinity)
nodeSelector: {}

# Tolerations (allow scheduling on all nodes)
tolerations:
  - operator: Exists

# Affinity
affinity: {}

# Security context
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0

securityContext:
  privileged: true

# DNS configuration
dnsProxy:
  enabled: true
  port: 53

# Hubble (observability)
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    service:
      type: ClusterIP
