# external-secrets Operator Helm Values
# Synchronizes secrets from Vault to Kubernetes

# Image configuration
image:
  repository: ghcr.io/external-secrets/external-secrets
  tag: null  # Use default from chart

# Deployment
replicaCount: 1
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# RBAC
rbac:
  create: true

# Service account
serviceAccount:
  create: true
  name: external-secrets

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Node selection
nodeSelector: {}
tolerations:
  - operator: Exists
affinity: {}

# Webhook configuration
webhook:
  enabled: true
  replicaCount: 1
  
  service:
    type: ClusterIP
    port: 443
    targetPort: 10250

  # Webhook port
  port: 10250

  # Hostname
  host: external-secrets-webhook

# Cert controller configuration
certController:
  enabled: true
  replicaCount: 1

# Metrics
metrics:
  enabled: true
  service:
    type: ClusterIP
    port: 8080

# Logging
logLevel: info

# Vault backend configuration
# This will be configured via SecretStore resources
# See kustomize/base/vault-secretstore.yaml

# Webhook validation
validation:
  enabled: true

# Provider configuration
providers:
  # Vault provider will be configured via SecretStore
  vault:
    enabled: true
