# ExternalDNS Configuration
# Automatically manages DNS records for Kubernetes resources
#
# Uses Cloudflare provider with API token from existing cert-manager secret
# Domain: example.com (manages *.support.example.com)

# Cloudflare provider configuration
provider:
  name: cloudflare

# Sources to watch for DNS records
# gateway-httproute is added via helmfile when useGatewayAPI is true
sources:
  - service
  - ingress

# Domain filter - Cloudflare zone to manage records in
# Must match a Cloudflare zone name (example.com), not a subdomain
domainFilters:
  - example.com

# TXT record ownership configuration
# txtOwnerId is set per-cluster via helmfile state values
# txtOwnerId: "k8s-cluster-kss"  (overridden in helmfile.yaml.gotmpl)
txtPrefix: "externaldns-"

# Policy: sync will create and delete records, upsert-only won't delete
policy: sync

# Registry for tracking ownership
registry: txt

# Cloudflare-specific settings
# proxied: false means direct DNS (not through Cloudflare CDN)
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

# Sync interval
interval: 1m

# Log level
logLevel: info

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Run on any node
tolerations:
  - operator: Exists

# Service account
serviceAccount:
  create: true
  name: external-dns

# RBAC
rbac:
  create: true
