# Harbor pull secret — synced from Vault via ExternalSecrets
# Each app namespace needs its own copy to pull images from Harbor
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: harbor-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .Values.image.registry }}":{"username":"{{`{{ .username }}`}}","password":"{{`{{ .password }}`}}","auth":"{{`{{ printf "%s:%s" .username .password | b64enc }}`}}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: harbor/apps-pull
        property: username
    - secretKey: password
      remoteRef:
        key: harbor/apps-pull
        property: password
