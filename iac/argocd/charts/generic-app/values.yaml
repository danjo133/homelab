# --- Developer-facing values (set in deploy/values.yaml) ---

# Short name for the service — becomes <name>.<clusterDomain>
# Example: "sl" → sl.kss.example.com
name: ""

# Container port the app listens on
port: 8080

# Memory limit (request is set to half)
memory: 256Mi

# CPU resources
cpu:
  request: 10m
  limit: 100m

# Portal metadata — rendered as portal.example.com/* annotations on Ingress/HTTPRoute
portal:
  enabled: false
  name: ""            # defaults to .Release.Name
  description: ""
  icon: ""
  category: "Apps"
  order: 100

# PostgreSQL via CloudNativePG
postgres:
  enabled: false
  database: ""        # defaults to .Release.Name
  size: 1Gi
  version: "17"

# Persistent storage
storage:
  enabled: false
  size: 1Gi
  mountPath: /data

# Enable OAuth2 Proxy SSO (Keycloak via nginx auth_request)
sso: false

# Extra annotations added to Ingress/HTTPRoute (e.g. portal metadata)
ingressAnnotations: {}

# Environment variables
env: []
envFrom: []

# Health probes (disabled by default)
probes:
  liveness:
    enabled: false
    path: /healthz
  readiness:
    enabled: false
    path: /readyz

# --- Platform-injected values (set by ApplicationSet) ---

# Cluster domain, injected by ApplicationSet helm parameter
# e.g., kss.example.com
clusterDomain: ""

# Portal annotation prefix, injected by ApplicationSet helm parameter
portalPrefix: "portal.example.com"

# Ingress mode: "nginx" (KSS) or "gateway" (KCS)
ingressMode: nginx

# Gateway API settings (only used when ingressMode=gateway)
gateway:
  name: main-gateway
  namespace: istio-ingress
  sectionName: https

image:
  registry: harbor.support.example.com
  repository: apps/app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-pull-secret

replicaCount: 1
