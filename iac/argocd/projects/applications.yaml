apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: End-user applications (waves 4, 5)
  sourceRepos:
    - https://github.com/example-user/homelab.git
    - https://kubernetes-sigs.github.io/headlamp/
    - https://kiali.org/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: identity
    - server: https://kubernetes.default.svc
      namespace: headlamp
    - server: https://kubernetes.default.svc
      namespace: istio-system
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
