apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bootstrap
  namespace: argocd
spec:
  description: Core infrastructure (waves -5 to -1)
  sourceRepos:
    - https://github.com/example-user/homelab.git
    - https://charts.jetstack.io
    - https://charts.external-secrets.io
    - https://kubernetes-sigs.github.io/external-dns
    - https://metallb.github.io/metallb
    - https://kubernetes.github.io/ingress-nginx
    - https://prometheus-community.github.io/helm-charts
    - https://istio-release.storage.googleapis.com/charts
    - https://helm.cilium.io
  destinations:
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: external-dns
    - server: https://kubernetes.default.svc
      namespace: metallb-system
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: istio-system
    - server: https://kubernetes.default.svc
      namespace: istio-ingress
    - server: https://kubernetes.default.svc
      namespace: monitoring
    # harbor-pull-secrets cross-namespace ExternalSecrets
    - server: https://kubernetes.default.svc
      namespace: default
    - server: https://kubernetes.default.svc
      namespace: keycloak
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: longhorn-system
    - server: https://kubernetes.default.svc
      namespace: identity
    - server: https://kubernetes.default.svc
      namespace: trivy-system
    - server: https://kubernetes.default.svc
      namespace: vault-auth
    - server: https://kubernetes.default.svc
      namespace: cilium-secrets
    # gateway-config routes to services in these namespaces
    - server: https://kubernetes.default.svc
      namespace: headlamp
    - server: https://kubernetes.default.svc
      namespace: oauth2-proxy
    - server: https://kubernetes.default.svc
      namespace: ziti-system
    - server: https://kubernetes.default.svc
      namespace: teleport
    - server: https://kubernetes.default.svc
      namespace: kube-public
    # apps-discovery cross-namespace ExternalSecrets
    - server: https://kubernetes.default.svc
      namespace: apps
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: networking.k8s.io
      kind: IngressClass
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: cilium.io
      kind: "*"
