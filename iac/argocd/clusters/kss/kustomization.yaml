apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Projects
  - ../../projects/bootstrap.yaml
  - ../../projects/platform.yaml
  - ../../projects/identity.yaml
  - ../../projects/applications.yaml
  # Shared base applications
  - ../../base
  # kss-specific helm apps
  - metallb.yaml
  - nginx-ingress.yaml
  # kss-specific kustomize apps
  - metallb-config.yaml
  - cluster-secrets.yaml
  - cluster-certs.yaml
  - harbor-pull-secrets.yaml
  - keycloak-instance.yaml
  - oidc-rbac.yaml
  - oauth2-proxy-config.yaml
  - monitoring-config.yaml
  - jit-elevation.yaml
  - cluster-setup.yaml
  - headlamp-config.yaml

patches:
  # Replace CLUSTER_NAME in base multi-source Application valueFiles paths
  - target:
      kind: Application
      name: argocd
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/argocd.yaml
  - target:
      kind: Application
      name: external-dns
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/external-dns.yaml
  - target:
      kind: Application
      name: longhorn
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/longhorn.yaml
  - target:
      kind: Application
      name: oauth2-proxy
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/oauth2-proxy.yaml
  - target:
      kind: Application
      name: kube-prometheus-stack
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/monitoring.yaml
  - target:
      kind: Application
      name: loki
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/loki.yaml
  - target:
      kind: Application
      name: headlamp
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/headlamp.yaml
  - target:
      kind: Application
      name: spire
    patch: |
      - op: replace
        path: /spec/sources/2/helm/valueFiles/1
        value: $values/iac/argocd/values/kss/spire.yaml
