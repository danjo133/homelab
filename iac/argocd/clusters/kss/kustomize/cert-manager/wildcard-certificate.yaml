# Wildcard certificate for *.support.example.com
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-kss-example-com
  namespace: cert-manager
spec:
  secretName: wildcard-kss-example-com
  duration: 2160h
  renewBefore: 360h
  commonName: "*.support.example.com"
  dnsNames:
    - "*.support.example.com"
    - "kss.example.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256
