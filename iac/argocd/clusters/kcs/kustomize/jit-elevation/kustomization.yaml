apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../kustomize/base/jit-elevation

patches:
  # Patch ConfigMap for kcs cluster Keycloak URL
  - target:
      kind: ConfigMap
      name: jit-config
    patch: |
      - op: replace
        path: /data/KEYCLOAK_URL
        value: "https://auth.mesh-k8s.example.com"

  # DELETE the Ingress (kcs uses HTTPRoute from gateway/)
  - target:
      kind: Ingress
      name: jit-elevation
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: jit-elevation
