apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../kustomize/base/cluster-setup

patches:
  # Patch ConfigMap for kcs cluster values
  - target:
      kind: ConfigMap
      name: cluster-setup-config
    patch: |
      - op: replace
        path: /data/CLUSTER_NAME
        value: "kcs"
      - op: replace
        path: /data/CLUSTER_DOMAIN
        value: "mesh-k8s.example.com"
      - op: replace
        path: /data/KEYCLOAK_URL
        value: "https://auth.mesh-k8s.example.com"
      - op: replace
        path: /data/API_SERVER
        value: "https://kcs-master.mesh-k8s.example.com:6443"

  # DELETE the Namespace (owned by jit-elevation app)
  - target:
      kind: Namespace
      name: identity
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: identity

  # DELETE the Ingress (kcs uses HTTPRoute from gateway/)
  - target:
      kind: Ingress
      name: cluster-setup
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: cluster-setup
