# HTTPRoute for Portal (service discovery landing page)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portal
  namespace: kube-public
  annotations:
    portal.example.com/name: "Cluster Portal"
    portal.example.com/description: "Service discovery landing page"
    portal.example.com/icon: "\U0001F9ED"
    portal.example.com/category: "Platform"
    portal.example.com/order: "0"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - portal.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: portal
          port: 80
