# Route /oauth2/* on any cluster hostname to oauth2-proxy.
# When ext-authz denies a request, oauth2-proxy redirects the browser to
# /oauth2/start on the ORIGINAL host. This route catches that redirect and
# sends it to oauth2-proxy instead of the protected service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-proxy-passthrough
  namespace: oauth2-proxy
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - "*.support.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: oauth2-proxy
          port: 80
