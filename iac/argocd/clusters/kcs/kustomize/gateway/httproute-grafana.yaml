# HTTPRoute for Grafana
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    portal.example.com/name: "Grafana"
    portal.example.com/description: "Dashboards and observability"
    portal.example.com/icon: "\U0001F4CA"
    portal.example.com/category: "Monitoring"
    portal.example.com/order: "10"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - grafana.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
