# HTTPRoute for Grafana
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - grafana.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
