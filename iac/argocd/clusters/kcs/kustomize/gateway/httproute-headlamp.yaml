# HTTPRoute for Headlamp (K8s Dashboard)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
  annotations:
    portal.example.com/name: "Headlamp"
    portal.example.com/description: "Kubernetes dashboard"
    portal.example.com/icon: "\U0001F4BB"
    portal.example.com/category: "Platform"
    portal.example.com/order: "20"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - k8s.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: headlamp
          port: 80
