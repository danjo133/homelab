# HTTPRoute for Headlamp (K8s Dashboard)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - k8s.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: headlamp
          port: 80
