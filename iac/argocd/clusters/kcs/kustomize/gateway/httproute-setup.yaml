# HTTPRoute for Cluster Setup (protected by ext-authz)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cluster-setup
  namespace: identity
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - setup.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: cluster-setup
          port: 80
