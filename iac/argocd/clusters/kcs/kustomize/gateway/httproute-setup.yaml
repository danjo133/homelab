# HTTPRoute for Cluster Setup (protected by ext-authz)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cluster-setup
  namespace: identity
  annotations:
    portal.example.com/name: "Cluster Setup"
    portal.example.com/description: "OIDC token info and kubeconfig download"
    portal.example.com/icon: "\U0001F511"
    portal.example.com/category: "Identity"
    portal.example.com/order: "20"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - setup.kcs.example.com
  rules:
    - backendRefs:
        - name: cluster-setup
          port: 80
