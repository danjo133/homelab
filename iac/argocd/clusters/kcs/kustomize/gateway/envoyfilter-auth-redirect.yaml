# Inject X-Auth-Request-Redirect header with the full original URL.
#
# OAuth2-Proxy in ext-authz mode only stores the request PATH in the OIDC
# state parameter.  After the callback it redirects to that path on the
# oauth2-proxy hostname instead of the original app.  This Lua filter runs
# before ext-authz and sets X-Auth-Request-Redirect to the full URL so
# OAuth2-Proxy uses it as the post-auth redirect destination.
#
# Equivalent of nginx's:  error_page 401 = /oauth2/start?rd=$scheme://$host$request_uri
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: oauth2-redirect-header
  namespace: istio-ingress
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: main-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_FIRST
        value:
          name: envoy.filters.http.lua.oauth2_redirect
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              function envoy_on_request(request_handle)
                local host = request_handle:headers():get(":authority")
                local path = request_handle:headers():get(":path")
                if host and path then
                  request_handle:headers():add("x-auth-request-redirect",
                    "https://" .. host .. path)
                end
              end
