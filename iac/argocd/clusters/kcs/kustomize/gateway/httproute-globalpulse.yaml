# HTTPRoute for GlobalPulse (real-time intelligence dashboard)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: globalpulse
  namespace: globalpulse
  annotations:
    portal.example.com/name: "World Monitor"
    portal.example.com/description: "Real-time global intelligence dashboard"
    portal.example.com/icon: "\U0001F30D"
    portal.example.com/category: "Applications"
    portal.example.com/order: "60"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - world.kcs.example.com
  rules:
    - backendRefs:
        - name: globalpulse
          port: 80
