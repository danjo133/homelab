# AuthorizationPolicy for OAuth2-Proxy ext-authz
# Protects ALL routes through the gateway by default.
# Services with their own auth are excluded via notHosts.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: oauth2-proxy-auth
  namespace: istio-ingress
spec:
  targetRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: main-gateway
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            notHosts:
              - argocd.mesh-k8s.example.com      # Own OIDC login
              - auth.mesh-k8s.example.com         # Keycloak — is the IdP
              - grafana.mesh-k8s.example.com      # Own OAuth login
              - oauth2-proxy.mesh-k8s.example.com # Auth proxy itself
              - k8s.mesh-k8s.example.com          # Headlamp — own OIDC login
              - jit.mesh-k8s.example.com          # Token exchange API
              - chat.mesh-k8s.example.com         # Open WebUI — own OIDC login
            notPaths:
              - /oauth2/*                     # Let passthrough route handle auth flow
