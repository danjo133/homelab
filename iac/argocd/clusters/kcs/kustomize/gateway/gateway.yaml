# Gateway - Main entry point for external traffic (Istio)
# Terminates TLS using the wildcard certificate for *.support.example.com
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: istio-ingress
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "*.support.example.com"
spec:
  gatewayClassName: istio
  listeners:
    # HTTP listener - redirects to HTTPS
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.support.example.com"
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener with TLS termination
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.support.example.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-kcs-example-com
            namespace: cert-manager
      allowedRoutes:
        namespaces:
          from: All
