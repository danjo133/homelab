# HTTPRoute for Hubble UI (protected by ext-authz)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
  annotations:
    portal.example.com/name: "Hubble"
    portal.example.com/description: "Cilium network observability"
    portal.example.com/icon: "\U0001F52D"
    portal.example.com/category: "Monitoring"
    portal.example.com/order: "20"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - hubble.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: hubble-ui
          port: 80
