# HTTPRoute for ArgoCD
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    portal.example.com/name: "ArgoCD"
    portal.example.com/description: "GitOps continuous deployment"
    portal.example.com/icon: "\U0001F680"
    portal.example.com/category: "Platform"
    portal.example.com/order: "10"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - argocd.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: argocd-server
          port: 443
