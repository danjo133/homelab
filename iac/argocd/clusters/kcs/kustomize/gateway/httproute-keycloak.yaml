# HTTPRoute for Keycloak
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - auth.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: broker-keycloak-service
          port: 8080
