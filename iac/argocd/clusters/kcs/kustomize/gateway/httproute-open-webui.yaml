# HTTPRoute for Open WebUI (AI Chat Interface)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: open-webui
  namespace: open-webui
  annotations:
    portal.example.com/name: "Open WebUI"
    portal.example.com/description: "AI chat interface"
    portal.example.com/icon: "chat"
    portal.example.com/category: "Applications"
    portal.example.com/order: "50"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - chat.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: open-webui
          port: 80
