# HTTPRoute for Architecture Diagrams
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: architecture
  namespace: apps
  annotations:
    portal.example.com/name: "Architecture"
    portal.example.com/description: "Infrastructure architecture diagrams"
    portal.example.com/icon: "\U0001F3D7"
    portal.example.com/category: "Platform"
    portal.example.com/order: "5"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - architecture.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: architecture
          port: 80
