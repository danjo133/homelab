# HTTPRoute for JIT Elevation
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jit-elevation
  namespace: identity
  annotations:
    portal.example.com/name: "JIT Elevation"
    portal.example.com/description: "Temporary privilege escalation requests"
    portal.example.com/icon: "\U0001F6E1\uFE0F"
    portal.example.com/category: "Identity"
    portal.example.com/order: "30"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - jit.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: jit-elevation
          port: 80
