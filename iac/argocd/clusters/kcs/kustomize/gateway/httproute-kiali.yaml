# HTTPRoute for Kiali (Istio Mesh UI)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
  annotations:
    portal.example.com/name: "Kiali"
    portal.example.com/description: "Istio service mesh console"
    portal.example.com/icon: "\U0001F578"
    portal.example.com/category: "Monitoring"
    portal.example.com/order: "30"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - kiali.kcs.example.com
  rules:
    - backendRefs:
        - name: kiali
          port: 20001
