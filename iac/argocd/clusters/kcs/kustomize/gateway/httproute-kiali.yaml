# HTTPRoute for Kiali (Istio Mesh UI)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - kiali.mesh-k8s.example.com
  rules:
    - backendRefs:
        - name: kiali
          port: 20001
