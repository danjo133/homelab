# HTTPRoute for Longhorn UI
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    portal.example.com/name: "Longhorn"
    portal.example.com/description: "Distributed block storage management"
    portal.example.com/icon: "\U0001F4BE"
    portal.example.com/category: "Platform"
    portal.example.com/order: "30"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - longhorn.kcs.example.com
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
