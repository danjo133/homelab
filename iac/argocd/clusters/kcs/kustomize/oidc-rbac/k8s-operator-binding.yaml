# ClusterRoleBinding: k8s-operator group gets k8s-operator role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-k8s-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-operator
subjects:
  - kind: Group
    name: "oidc:k8s-operators"
    apiGroup: rbac.authorization.k8s.io
