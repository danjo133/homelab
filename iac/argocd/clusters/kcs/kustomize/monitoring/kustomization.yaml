apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../kustomize/base/monitoring

patches:
  # Patch loki-minio-secret Vault key for kcs cluster
  - target:
      kind: ExternalSecret
      name: loki-minio-secret
    patch: |
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: minio/loki-kcs
      - op: replace
        path: /spec/data/1/remoteRef/key
        value: minio/loki-kcs
