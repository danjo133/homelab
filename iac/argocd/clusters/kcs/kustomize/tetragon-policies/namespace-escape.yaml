# Detect namespace manipulation in containers (observe-only)
# setns and unshare from within containers may indicate escape attempts
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: namespace-escape
spec:
  kprobes:
    - call: "sys_setns"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "int"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values:
                - "host_ns"
    - call: "sys_unshare"
      syscall: true
      args:
        - index: 0
          type: "int"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values:
                - "host_ns"
