# Detect kernel module loading (observe-only)
# Unexpected module loads may indicate rootkit installation
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: kernel-module-loading
spec:
  kprobes:
    # Automatic module loading (e.g. modprobe triggered by kernel)
    - call: "security_kernel_module_request"
      syscall: false
      return: true
      args:
        - index: 0
          type: "string"
      returnArg:
        index: 0
        type: "int"
    # Explicit module loading via finit_module (READING_MODULE=2)
    - call: "security_kernel_read_file"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "2"
