# Wildcard Certificate for *.support.example.com
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-kcs
  namespace: cert-manager
spec:
  secretName: wildcard-kcs-example-com
  duration: 2160h    # 90 days
  renewBefore: 360h  # Renew 15 days before expiry
  commonName: "*.support.example.com"
  dnsNames:
    - "*.support.example.com"
    - "kcs.example.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    size: 256
