apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../kustomize/base/portal
  - support-services.yaml

patches:
  - target:
      kind: ConfigMap
      name: portal-config
    patch: |
      - op: replace
        path: /data/CLUSTER_NAME
        value: "kcs"
      - op: replace
        path: /data/CLUSTER_DOMAIN
        value: "mesh-k8s.example.com"
  # Delete Ingress on kcs (uses Gateway API HTTPRoute instead)
  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: portal
        namespace: kube-public
      $patch: delete
