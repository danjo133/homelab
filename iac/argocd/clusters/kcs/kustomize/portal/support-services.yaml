# Support VM services — portal discovery entries (annotation-only, no routing)
# DNS for *.support.example.com resolves directly to the support VM.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: support-vault
  namespace: kube-public
  annotations:
    portal.example.com/name: "Vault"
    portal.example.com/description: "Secrets management & PKI"
    portal.example.com/icon: "\U0001F510"
    portal.example.com/category: "Infrastructure"
    portal.example.com/order: "10"
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - vault.support.example.com
  rules:
    - backendRefs:
        - name: portal
          port: 80
