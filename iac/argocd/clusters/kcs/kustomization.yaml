apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Projects
  - ../../projects/bootstrap.yaml
  - ../../projects/platform.yaml
  - ../../projects/identity.yaml
  - ../../projects/applications.yaml
  # Shared base applications
  - ../../base
  # kcs-specific CRDs
  - gateway-api-crds.yaml
  # kcs-specific helm apps
  - cilium.yaml
  - tetragon.yaml
  - istio-base.yaml
  - istiod.yaml
  - istio-cni.yaml
  - istio-ztunnel.yaml
  - kiali.yaml
  # kcs-specific kustomize apps
  - cilium-config.yaml
  - tetragon-policies.yaml
  - gateway-config.yaml
  - cluster-secrets.yaml
  - cluster-certs.yaml
  - harbor-pull-secrets.yaml
  - keycloak-instance.yaml
  - oidc-rbac.yaml
  - oauth2-proxy-config.yaml
  - monitoring-config.yaml
  - jit-elevation.yaml
  - cluster-setup.yaml
  - headlamp-config.yaml
  - portal.yaml
  - architecture.yaml
  - kiali-config.yaml
  - ziti-router-config.yaml
  - teleport-kube-agent-config.yaml
  - globalpulse.yaml
  # Apps auto-discovery
  - apps-discovery.yaml
  - appset-own-chart.yaml
  - appset-generic-chart.yaml

patches:
  # Replace CLUSTER_NAME in base multi-source Application valueFiles paths
  - target:
      kind: Application
      name: argocd
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/argocd.yaml
  - target:
      kind: Application
      name: external-dns
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/external-dns.yaml
  - target:
      kind: Application
      name: longhorn
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/longhorn.yaml
  - target:
      kind: Application
      name: oauth2-proxy
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/oauth2-proxy.yaml
  - target:
      kind: Application
      name: kube-prometheus-stack
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/monitoring.yaml
  - target:
      kind: Application
      name: loki
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/loki.yaml
  - target:
      kind: Application
      name: headlamp
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/headlamp.yaml
  - target:
      kind: Application
      name: spire
    patch: |
      - op: replace
        path: /spec/sources/2/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/spire.yaml
  - target:
      kind: Application
      name: ziti-router
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/ziti-router.yaml
  - target:
      kind: Application
      name: teleport-kube-agent
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/teleport-kube-agent.yaml
  - target:
      kind: Application
      name: open-webui
    patch: |
      - op: replace
        path: /spec/sources/1/helm/valueFiles/1
        value: $values/iac/argocd/values/kcs/open-webui.yaml
