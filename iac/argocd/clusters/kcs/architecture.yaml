apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: architecture
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd-image-updater.argoproj.io/image-list: "app=harbor.support.example.com/apps/architecture"
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^[0-9a-f]{40}$"
    argocd-image-updater.argoproj.io/app.kustomize.image-name: harbor.support.example.com/apps/architecture
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: applications
  source:
    repoURL: https://github.com/example-user/homelab.git
    targetRevision: main
    path: iac/argocd/clusters/kcs/kustomize/architecture
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-public
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
