apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-generic-chart
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - scmProvider:
        gitlab:
          group: "apps"
          api: __GITLAB_URL__
          tokenRef:
            secretName: gitlab-scm-token
            key: token
          insecure: true
        filters:
          - pathsExist:
              - deploy/values.yaml
            pathsDoNotExist:
              - chart/Chart.yaml
        cloneProtocol: ssh
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/sources/1/helm/parameters
  template:
    metadata:
      name: "{{ .repository | normalize }}"
      namespace: argocd
      annotations:
        argocd-image-updater.argoproj.io/image-list: "app=__HARBOR_DOMAIN__/apps/{{ .repository | normalize }}"
        argocd-image-updater.argoproj.io/app.update-strategy: newest-build
        argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^[0-9a-f]{40}$"
        argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/write-back-method: argocd
    spec:
      project: applications
      sources:
        - repoURL: "{{ .url }}"
          targetRevision: "{{ .branch }}"
          ref: appvalues
        - repoURL: __REPO_URL__
          targetRevision: __TARGET_REVISION__
          path: iac/argocd/charts/generic-app
          helm:
            valueFiles:
              - $appvalues/deploy/values.yaml
            parameters:
              - name: image.repository
                value: "apps/{{ .repository | normalize }}"
              - name: clusterDomain
                value: __CLUSTER_DOMAIN__
              - name: portalPrefix
                value: __PORTAL_PREFIX__
      destination:
        server: https://kubernetes.default.svc
        namespace: apps
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
