apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-pull-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: bootstrap
  source:
    repoURL: __REPO_URL__
    targetRevision: __TARGET_REVISION__
    path: iac/argocd/clusters/__CLUSTER_NAME__/kustomize/harbor
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
