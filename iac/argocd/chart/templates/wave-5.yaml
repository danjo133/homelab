        argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^[0-9a-f]{40}$"
        argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/write-back-method: argocd
    spec:
      project: applications
      sources:
        - repoURL: '{{ "{{ .url }}" }}'
          targetRevision: '{{ "{{ .branch }}" }}'
          ref: appvalues
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: iac/argocd/charts/generic-app
          helm:
            valueFiles:
              - $appvalues/deploy/values.yaml
            parameters:
              - name: image.registry
                value: {{ .Values.harborRegistry }}
              - name: image.repository
                value: 'apps/{{ "{{ .repository | normalize }}" }}'
              - name: clusterDomain
                value: {{ .Values.clusterDomain }}
              - name: portalPrefix
                value: {{ .Values.portalPrefix }}
              - name: ingressMode
                value: gateway
              - name: gateway.name
                value: main-gateway
              - name: gateway.namespace
                value: istio-ingress
              - name: gateway.sectionName
                value: https
      destination:
        server: https://kubernetes.default.svc
