# Wave 5: ApplicationSets (auto-discovered apps)
{{- if eq .Values.cni "default" }}
# --- Generic app chart (nginx ingress) ---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-generic-chart
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - scmProvider:
        gitlab:
          group: "apps"
          api: {{ .Values.gitlabUrl }}
          tokenRef:
            secretName: gitlab-scm-token
            key: token
          insecure: true
        filters:
          - pathsExist:
              - deploy/values.yaml
            pathsDoNotExist:
              - chart/Chart.yaml
        cloneProtocol: ssh
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/sources/1/helm/parameters
  template:
    metadata:
      name: '{{ "{{ .repository | normalize }}" }}'
      namespace: argocd
      annotations:
        argocd-image-updater.argoproj.io/image-list: 'app={{ .Values.harborRegistry }}/apps/{{ "{{ .repository | normalize }}" }}'
        argocd-image-updater.argoproj.io/app.update-strategy: newest-build
        argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^[0-9a-f]{40}$"
        argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/write-back-method: argocd
    spec:
      project: applications
      sources:
        - repoURL: '{{ "{{ .url }}" }}'
          targetRevision: '{{ "{{ .branch }}" }}'
          ref: appvalues
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: iac/argocd/charts/generic-app
          helm:
            valueFiles:
              - $appvalues/deploy/values.yaml
            parameters:
              - name: image.registry
                value: {{ .Values.harborRegistry }}
              - name: image.repository
                value: 'apps/{{ "{{ .repository | normalize }}" }}'
              - name: clusterDomain
                value: {{ .Values.clusterDomain }}
              - name: portalPrefix
                value: {{ .Values.portalPrefix }}
      destination:
        server: https://kubernetes.default.svc
        namespace: 'apps-{{ "{{ .repository | normalize }}" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            app.kubernetes.io/managed-by: argocd-appset
            homelab.dev/origin: github-mirror
          annotations:
            homelab.dev/source-repo: '{{ "{{ .url }}" }}'
            homelab.dev/source-branch: '{{ "{{ .branch }}" }}'
        syncOptions:
          - CreateNamespace=true
{{- end }}
{{- if eq (include "root-app.isIstioMesh" .) "true" }}
