apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bootstrap
  namespace: argocd
spec:
  description: Core infrastructure (waves -5 to -1)
  sourceRepos:
    - {{ .Values.repoURL }}
    - https://charts.jetstack.io
    - https://charts.external-secrets.io
    - https://kubernetes-sigs.github.io/external-dns
    - https://metallb.github.io/metallb
    - https://kubernetes.github.io/ingress-nginx
    - https://prometheus-community.github.io/helm-charts
    - https://istio-release.storage.googleapis.com/charts
    - https://helm.cilium.io
    - https://crowdsecurity.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: external-dns
    - server: https://kubernetes.default.svc
      namespace: metallb-system
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: istio-system
    - server: https://kubernetes.default.svc
      namespace: istio-ingress
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: default
    - server: https://kubernetes.default.svc
      namespace: keycloak
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: longhorn-system
    - server: https://kubernetes.default.svc
      namespace: identity
    - server: https://kubernetes.default.svc
      namespace: trivy-system
    - server: https://kubernetes.default.svc
      namespace: vault-auth
    - server: https://kubernetes.default.svc
      namespace: cilium-secrets
    - server: https://kubernetes.default.svc
      namespace: open-webui
    - server: https://kubernetes.default.svc
      namespace: headlamp
    - server: https://kubernetes.default.svc
      namespace: oauth2-proxy
    - server: https://kubernetes.default.svc
      namespace: ziti-system
    - server: https://kubernetes.default.svc
      namespace: teleport
    - server: https://kubernetes.default.svc
      namespace: kube-public
    - server: https://kubernetes.default.svc
      namespace: globalpulse
    - server: https://kubernetes.default.svc
      namespace: apps-*
    - server: https://kubernetes.default.svc
      namespace: openclaw
    - server: https://kubernetes.default.svc
      namespace: spire-system
    - server: https://kubernetes.default.svc
      namespace: beyla-system
    - server: https://kubernetes.default.svc
      namespace: cnpg-system
    - server: https://kubernetes.default.svc
      namespace: keycloak-operator
    - server: https://kubernetes.default.svc
      namespace: gatekeeper-system
    - server: https://kubernetes.default.svc
      namespace: crowdsec
    - server: https://kubernetes.default.svc
      namespace: dependency-track
    - server: https://kubernetes.default.svc
      namespace: istio-ingress
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: networking.k8s.io
      kind: IngressClass
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: cilium.io
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform operators and monitoring (waves 0, 2, 3)
  sourceRepos:
    - {{ .Values.repoURL }}
    - https://argoproj.github.io/argo-helm
    - https://charts.longhorn.io
    - https://open-policy-agent.github.io/gatekeeper/charts
    - https://spiffe.github.io/helm-charts-hardened
    - https://prometheus-community.github.io/helm-charts
    - https://grafana.github.io/helm-charts
    - https://aquasecurity.github.io/helm-charts
    - https://cloudnative-pg.github.io/charts
    - https://openziti.io/helm-charts
    - https://charts.releases.teleport.dev
    - https://crowdsecurity.github.io/helm-charts
    - https://dependencytrack.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: longhorn-system
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: beyla-system
    - server: https://kubernetes.default.svc
      namespace: trivy-system
    - server: https://kubernetes.default.svc
      namespace: gatekeeper-system
    - server: https://kubernetes.default.svc
      namespace: spire-system
    - server: https://kubernetes.default.svc
      namespace: cnpg-system
    - server: https://kubernetes.default.svc
      namespace: ziti-system
    - server: https://kubernetes.default.svc
      namespace: teleport
    - server: https://kubernetes.default.svc
      namespace: crowdsec
    - server: https://kubernetes.default.svc
      namespace: dependency-track
    - server: https://kubernetes.default.svc
      namespace: kube-system
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: templates.gatekeeper.sh
      kind: ConstraintTemplate
    - group: constraints.gatekeeper.sh
      kind: "*"
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: ""
      kind: Namespace
    - group: monitoring.coreos.com
      kind: "*"
    - group: spire.spiffe.io
      kind: ClusterSPIFFEID
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: storage.k8s.io
      kind: CSIDriver
    - group: aquasecurity.github.io
      kind: "*"
    - group: cilium.io
      kind: CiliumClusterwideNetworkPolicy
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: identity
  namespace: argocd
spec:
  description: Identity and access management (wave 1)
  sourceRepos:
    - {{ .Values.repoURL }}
    - https://oauth2-proxy.github.io/manifests
  destinations:
    - server: https://kubernetes.default.svc
      namespace: keycloak
    - server: https://kubernetes.default.svc
      namespace: keycloak-operator
    - server: https://kubernetes.default.svc
      namespace: oauth2-proxy
    - server: https://kubernetes.default.svc
      namespace: identity
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: End-user applications (waves 4, 5)
  sourceRepos:
    - {{ .Values.repoURL }}
    - {{ include "root-app.appsRepoPattern" . }}
    - https://kubernetes-sigs.github.io/headlamp/
    - https://kiali.org/helm-charts
    - https://helm.openwebui.com/
  destinations:
    - server: https://kubernetes.default.svc
      namespace: identity
    - server: https://kubernetes.default.svc
      namespace: headlamp
    - server: https://kubernetes.default.svc
      namespace: istio-system
    - server: https://kubernetes.default.svc
      namespace: apps-*
    - server: https://kubernetes.default.svc
      namespace: kube-public
    - server: https://kubernetes.default.svc
      namespace: open-webui
    - server: https://kubernetes.default.svc
      namespace: globalpulse
    - server: https://kubernetes.default.svc
      namespace: openclaw
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
