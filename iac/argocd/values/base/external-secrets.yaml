# external-secrets operator — syncs secrets from Vault
image:
  repository: ghcr.io/external-secrets/external-secrets

replicaCount: 1
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

rbac:
  create: true

serviceAccount:
  create: true
  name: external-secrets

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations:
  - operator: Exists
affinity: {}

webhook:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 443
    targetPort: 10250
  port: 10250
  host: external-secrets-webhook

certController:
  enabled: true
  replicaCount: 1

metrics:
  enabled: true
  service:
    type: ClusterIP
    port: 8080

logLevel: info

validation:
  enabled: true

providers:
  vault:
    enabled: true
