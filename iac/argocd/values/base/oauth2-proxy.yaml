# OAuth2-Proxy — web SSO via OIDC
config:
  existingSecret: oauth2-proxy-credentials
  cookieName: "_oauth2_proxy"

extraArgs:
  provider: oidc
  cookie-secure: "true"
  cookie-samesite: "lax"
  cookie-expire: "15m"
  cookie-refresh: "1m"
  pass-access-token: "true"
  set-authorization-header: "true"
  set-xauthrequest: "true"
  email-domain: "*"
  scope: "openid profile email groups"
  reverse-proxy: "true"
  skip-provider-button: "true"
  upstream: "static://200"

ingress:
  enabled: true
  className: nginx
  path: /oauth2
  pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

replicaCount: 1
