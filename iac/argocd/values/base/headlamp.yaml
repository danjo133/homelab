# Headlamp — Kubernetes dashboard with OIDC
config:
  # Disable session-ttl flag — not supported by current headlamp binary
  sessionTTL: null
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: headlamp-oidc

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi

replicaCount: 1
