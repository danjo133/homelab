# ExternalDNS — automatic DNS management via Cloudflare
provider:
  name: cloudflare

sources:
  - service
  - ingress

domainFilters:
  - example.com

txtPrefix: "externaldns-"

policy: sync

registry: txt

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

interval: 1m

logLevel: info

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi

tolerations:
  - operator: Exists

serviceAccount:
  create: true
  name: external-dns

rbac:
  create: true

# Wait for internet connectivity before starting external-dns.
# Prevents fatal crash → CrashLoopBackOff cascade when Cloudflare API
# is unreachable (e.g. during internet outages).
initContainers:
  - name: wait-for-internet
    image: busybox:1.37
    securityContext:
      runAsUser: 65534
      runAsNonRoot: true
    command:
      - sh
      - -c
      - |
        echo "Waiting for internet connectivity (api.cloudflare.com)..."
        until nslookup api.cloudflare.com > /dev/null 2>&1; do
          echo "DNS not available, retrying in 30s..."
          sleep 30
        done
        echo "Internet connectivity confirmed"
    resources:
      requests:
        cpu: 1m
        memory: 8Mi
      limits:
        memory: 16Mi
