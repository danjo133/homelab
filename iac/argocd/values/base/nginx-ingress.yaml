# Nginx ingress controller
controller:
  replicaCount: 1
  service:
    enabled: true
    type: LoadBalancer
    externalTrafficPolicy: Local
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  config:
    server-tokens: "false"
    proxy-body-size: "50m"
    proxy-buffer-size: "8k"
    # ModSecurity WAF with OWASP Core Rule Set
    enable-modsecurity: "true"
    enable-owasp-modsecurity-crs: "true"
    modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecRequestBodyAccess On
      SecRequestBodyLimit 50000000
      SecRequestBodyNoFilesLimit 131072
      SecResponseBodyAccess Off
      # Paranoia level 1 (least false positives)
      SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=1"
      # Anomaly scoring thresholds
      SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=5,setvar:tx.outbound_anomaly_score_threshold=4"
      # Allow standard REST methods (CRS defaults to GET HEAD POST OPTIONS only)
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH"
      # Allow text/plain content type (CRS rule 920420 blocks it by default)
      SecAction "id:900220,phase:1,nolog,pass,t:none,setvar:tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/reports+json| |application/csp-report| |text/plain|"
      # Allow health probes
      SecRule REQUEST_URI "@beginsWith /healthz" "id:1000,phase:1,allow,nolog"
      SecRule REQUEST_URI "@beginsWith /readyz" "id:1001,phase:1,allow,nolog"
      # DT frontend serves config.json which CRS 930130 (LFI restricted files) blocks
      SecRule REQUEST_URI "@streq /static/config.json" "id:1010,phase:1,nolog,pass,ctl:ruleRemoveById=930130"
  tolerations:
    - operator: Exists
  admissionWebhooks:
    enabled: true

defaultBackend:
  enabled: false
