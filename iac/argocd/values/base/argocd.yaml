# ArgoCD — GitOps continuous deployment
server:
  autoscaling:
    enabled: false
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    tls: true
    annotations:
      portal.example.com/name: "ArgoCD"
      portal.example.com/description: "GitOps continuous deployment"
      portal.example.com/icon: "\U0001F680"
      portal.example.com/category: "Platform"
      portal.example.com/order: "10"

configs:
  params:
    server.insecure: true
  cm:
    kustomize.buildOptions: "--load-restrictor LoadRestrictionsNone"
  ssh:
    # Local GitLab SSH host keys — auto-published to Vault by github-mirror
    # service on the support VM. Refresh with:
    #   ssh-keyscan -p 2222 gitlab.support.example.com
    extraHosts: |
      [gitlab.support.example.com]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIrMylPgSSJFgSHxKfuWJWJSIhhG72rGWeTgqTyJRRcn
      [gitlab.support.example.com]:2222 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBFe6+BeEFXTl/ZMO8Jh68WfzfSt3gHwJzoOe3cWyWPMYH4ltEg6KWmQgrp4yzeNfKtFdm8D0UIJGGqNFmiT53i0=
      [gitlab.support.example.com]:2222 ssh-rsa 
  rbac:
    policy.csv: |
      g, oidc:platform-admins, role:admin
      g, oidc:k8s-admins, role:admin
      g, oidc:web-admins, role:admin
      g, oidc:k8s-operators, role:readonly
      g, oidc:web-operators, role:readonly
    policy.default: role:readonly
    scopes: '[groups]'

repoServer:
  autoscaling:
    enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 2Gi

crds:
  install: true
  keep: true

redis:
  enabled: true

global:
  logging:
    level: info
    format: json
