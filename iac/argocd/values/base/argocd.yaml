# ArgoCD — GitOps continuous deployment
server:
  autoscaling:
    enabled: false
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    tls: true
    annotations: {}
    # Portal annotations added by per-cluster generated values

configs:
  params:
    server.insecure: true
  cm:
    kustomize.buildOptions: "--load-restrictor LoadRestrictionsNone"
  ssh:
    # GitLab SSH host keys — added by per-cluster generated values
    extraHosts: ""
  rbac:
    policy.csv: |
      g, oidc:platform-admins, role:admin
      g, oidc:k8s-admins, role:admin
      g, oidc:web-admins, role:admin
      g, oidc:k8s-operators, role:readonly
      g, oidc:web-operators, role:readonly
    policy.default: role:readonly
    scopes: '[groups]'

repoServer:
  autoscaling:
    enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  livenessProbe:
    timeoutSeconds: 8
    failureThreshold: 5

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 2Gi

crds:
  install: true
  keep: true

redis:
  enabled: true

global:
  logging:
    level: info
    format: json
