# SPIFFE/SPIRE — workload identity (base config)
# Per-cluster overrides (trustDomain, clusterName, OIDC ingress) in values/<cluster>/spire.yaml
global:
  installAndUpgradeHooks:
    enabled: false
  deleteHooks:
    enabled: false

spire-server:
  replicaCount: 1
  persistence:
    enabled: true
    size: 1Gi
  controllerManager:
    enabled: true
    identities:
      clusterSPIFFEIDs:
        default:
          spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
          podSelector: {}
          namespaceSelector: {}
  oidcDiscoveryProvider:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

spire-agent:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
