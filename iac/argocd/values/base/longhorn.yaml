# Longhorn — distributed block storage
defaultSettings:
  defaultReplicaCount: 2
  backupTarget: "nfs://10.69.50.10:/export/longhorn"
  createDefaultDiskLabeledNodes: false
  storageOverProvisioningPercentage: 200
  storageMinimalAvailablePercentage: 15
  guaranteedInstanceManagerCPU: 5
  taintToleration: "node-role.kubernetes.io/control-plane=true:NoSchedule"

persistence:
  defaultClass: true
  defaultClassReplicaCount: 2

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    portal.example.com/name: "Longhorn"
    portal.example.com/description: "Distributed block storage management"
    portal.example.com/icon: "\U0001F4BE"
    portal.example.com/category: "Platform"
    portal.example.com/order: "30"

longhornManager:
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

longhornDriver:
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

metrics:
  serviceMonitor:
    enabled: true
