# Longhorn — distributed block storage
defaultSettings:
  defaultReplicaCount: 2
  backupTarget: "nfs://10.69.50.10:/export/longhorn"  # IP overridden by per-cluster values
  createDefaultDiskLabeledNodes: false
  storageOverProvisioningPercentage: 200
  storageMinimalAvailablePercentage: 15
  guaranteedInstanceManagerCPU: 5
  taintToleration: "node-role.kubernetes.io/control-plane=true:NoSchedule"

persistence:
  defaultClass: true
  defaultClassReplicaCount: 2

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Portal annotations added by per-cluster generated values

longhornManager:
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

longhornDriver:
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

metrics:
  serviceMonitor:
    enabled: true
