ollama:
  enabled: false

pipelines:
  enabled: false

tika:
  enabled: false

redis:
  enabled: false

ollamaUrls:
  - "http://10.69.10.10:11434"

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 1500Mi
  limits:
    memory: 2Gi

persistence:
  enabled: true
  size: 2Gi

sso:
  enabled: true
  enableSignup: true
  mergeAccountsByEmail: true
  oidc:
    enabled: true
    clientId: "open-webui"
    clientExistingSecret: "open-webui-oidc"
    clientExistingSecretKey: "client-secret"
    providerName: "Keycloak"
    scopes: "openid email profile groups"
    providerUrl: "PLACEHOLDER"  # Overridden per-cluster

extraEnvVars:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: open-webui-db-credentials
        key: database-url
  - name: ENABLE_LOGIN_FORM
    value: "false"
