# Grafana Beyla — eBPF auto-instrumentation agent
# Generates RED metrics (Rate, Errors, Duration) for HTTP/gRPC services

preset: application

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

resources:
  requests:
    cpu: 25m
    memory: 80Mi
  limits:
    memory: 1Gi

# Override Instance ID hostname — uses K8s node name instead of pod name
# Note: K8s node name lookup (fetchNodeName) uses os.Hostname() which is
# fixed at the NixOS level via fix-transient-hostname systemd service
envValueFrom:
  BEYLA_HOSTNAME:
    fieldRef:
      fieldPath: spec.nodeName

service:
  enabled: true

serviceMonitor:
  enabled: true
  metrics:
    endpoint:
      interval: 30s

config:
  data:
    discovery:
      instrument:
        - k8s_namespace: "*"
    routes:
      unmatched: heuristic
    prometheus_export:
      port: 9090
      path: /metrics
    attributes:
      kubernetes:
        enable: true
