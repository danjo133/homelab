# cert-manager — automated certificate management
crds:
  enabled: true

replicaCount: 1

webhook:
  replicaCount: 1

cainjector:
  replicaCount: 1
  extraArgs:
    - --leader-election-lease-duration=60s
    - --leader-election-renew-deadline=40s
    - --leader-election-retry-period=8s

# Relaxed leader election — tolerate API server slowness on overcommitted hosts
extraArgs:
  - --leader-election-lease-duration=60s
  - --leader-election-renew-deadline=40s
  - --leader-election-retry-period=8s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations:
  - operator: Exists
affinity: {}

startupapicheck:
  enabled: false

prometheus:
  enabled: true
  servicemonitor:
    enabled: false
