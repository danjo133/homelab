# OPA Gatekeeper — policy enforcement
# TLS 1.2 required — RKE2 kube-apiserver only supports TLS 1.2 cipher suites
# for webhook calls (TLS_ECDHE_*). The default TLS 1.3 minimum causes webhook
# timeouts on clusters without a service mesh TLS upgrade layer.
controllerManager:
  tlsMinVersion: "1.2"

replicas: 1

audit:
  replicas: 1
  auditInterval: 60
  logLevel: INFO
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

enableMutation: true

exemptNamespaces:
  - kube-system
  - gatekeeper-system
  - spire-system

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
