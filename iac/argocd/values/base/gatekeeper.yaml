# OPA Gatekeeper — policy enforcement
replicas: 1

audit:
  replicas: 1
  auditInterval: 60
  logLevel: INFO
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

enableMutation: true

exemptNamespaces:
  - kube-system
  - gatekeeper-system
  - spire-system

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
