# kube-prometheus-stack — Prometheus + Grafana + AlertManager
prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: 18GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        memory: 2Gi
    enableRemoteWriteReceiver: true
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # Portal annotations added by per-cluster generated values
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  grafana.ini:
    auth:
      disable_login_form: false
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      auto_login: false
      client_id: grafana
      client_secret: "${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
      scopes: openid profile email groups
      role_attribute_path: "contains(groups[*], 'platform-admins') && 'Admin' || contains(groups[*], 'web-admins') && 'Admin' || contains(groups[*], 'web-operators') && 'Viewer' || 'Viewer'"
      role_attribute_strict: false
  envFromSecrets:
    - name: grafana-oidc-secret
      optional: true
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: '"traceID":"(\w+)"'
            name: TraceID
            url: "$${__value.raw}"
    - name: Tempo
      uid: tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
          filterBySpanID: false
        tracesToMetrics:
          datasourceUid: prometheus
          queries:
            - name: Request rate
              query: "sum(rate(http_server_request_duration_seconds_count{$$__tags}[$$__rate_interval]))"
            - name: Error rate
              query: "sum(rate(http_server_request_duration_seconds_count{$$__tags, http_response_status_code=~\"5..\"}[$$__rate_interval]))"
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        search:
          hide: false
        lokiSearch:
          datasourceUid: loki
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: utc

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: webhook
          matchers:
            - severity="critical"
        - receiver: webhook
          matchers:
            - alertname=~"BruteForce.*|CredentialStuffing.*|SQLInjection.*|XSSAttempt.*|Scanner.*|ModSecurity.*|PathTraversal.*"
          group_by: ["alertname", "service_name"]
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 1h
    receivers:
      - name: "null"
      - name: webhook
        webhook_configs:
          - url: "http://placeholder.local/webhook"
            send_resolved: true

nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
  tolerations:
    - operator: Exists

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi

kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
kubelet:
  enabled: true
coreDns:
  enabled: true
