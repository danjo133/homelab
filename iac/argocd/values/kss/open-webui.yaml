ingress:
  enabled: true
  class: nginx
  annotations:
    portal.example.com/name: "Open WebUI"
    portal.example.com/icon: "chat"
  host: chat.simple-k8s.example.com
  tls: true
  existingSecret: wildcard-simple-k8s.example.com-tls

sso:
  oidc:
    providerUrl: "https://auth.simple-k8s.example.com/realms/broker/.well-known/openid-configuration"
