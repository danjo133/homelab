# SPIRE — kss cluster overrides
global:
  spire:
    trustDomain: kss.example.com
    clusterName: kss

spire-server:
  oidcDiscoveryProvider:
    ingress:
      enabled: true
      className: nginx
      hosts:
        - spire-oidc.kss.example.com
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - secretName: spire-oidc-tls
          hosts:
            - spire-oidc.kss.example.com
