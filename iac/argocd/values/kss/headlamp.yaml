# Headlamp — kss cluster overrides
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    portal.example.com/name: "Headlamp"
    portal.example.com/description: "Kubernetes dashboard"
    portal.example.com/icon: "\U0001F4BB"
    portal.example.com/category: "Platform"
    portal.example.com/order: "20"
  hosts:
    - host: headlamp.kss.example.com
      paths:
        - path: /
          type: ImplementationSpecific
  tls:
    - secretName: wildcard-kss-example-com-tls
      hosts:
        - headlamp.kss.example.com
