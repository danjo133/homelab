# kube-prometheus-stack — kcs cluster overrides
grafana:
  ingress:
    enabled: false  # Uses Gateway API HTTPRoute
    hosts:
      - grafana.kcs.example.com
    tls:
      - secretName: wildcard-kcs-example-com-tls
        hosts:
          - grafana.kcs.example.com
  grafana.ini:
    server:
      root_url: "https://grafana.kcs.example.com"
    auth.generic_oauth:
      auth_url: "https://auth.kcs.example.com/realms/broker/protocol/openid-connect/auth"
      token_url: "https://auth.kcs.example.com/realms/broker/protocol/openid-connect/token"
      api_url: "https://auth.kcs.example.com/realms/broker/protocol/openid-connect/userinfo"
