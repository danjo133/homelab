# OAuth2-Proxy — kcs cluster overrides
extraArgs:
  oidc-issuer-url: "https://auth.mesh-k8s.example.com/realms/broker"
  cookie-domain: ".mesh-k8s.example.com"
  whitelist-domain: ".mesh-k8s.example.com"
  redirect-url: "https://oauth2-proxy.mesh-k8s.example.com/oauth2/callback"

ingress:
  enabled: false  # Uses Gateway API HTTPRoute
  hosts:
    - oauth2-proxy.mesh-k8s.example.com
  tls:
    - secretName: oauth2-proxy-tls
      hosts:
        - oauth2-proxy.mesh-k8s.example.com
