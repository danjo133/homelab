apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: open-webui
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/component: search
        app.kubernetes.io/part-of: open-webui
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: INSTANCE_NAME
              value: "searxng"
            - name: BASE_URL
              value: "http://searxng.open-webui.svc:8080/"
            - name: AUTOCOMPLETE
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: searxng-config
