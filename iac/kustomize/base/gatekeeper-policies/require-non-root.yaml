# Require containers to run as non-root
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirenonroot
spec:
  crd:
    spec:
      names:
        kind: K8sRequireNonRoot
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirenonroot

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container_is_non_root(container, input.review.object.spec)
          msg := sprintf("Container %v must set securityContext.runAsNonRoot to true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container_is_non_root(container, input.review.object.spec)
          msg := sprintf("Init container %v must set securityContext.runAsNonRoot to true", [container.name])
        }

        # Container is non-root if its own securityContext says so, or pod-level does
        container_is_non_root(container, podSpec) {
          container.securityContext.runAsNonRoot == true
        }
        container_is_non_root(container, podSpec) {
          podSpec.securityContext.runAsNonRoot == true
        }
---
# Warn: containers should run as non-root
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireNonRoot
metadata:
  name: require-run-as-non-root
spec:
  enforcementAction: warn
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - longhorn-system
      - spire-system
      - monitoring
      - beyla-system
      - trivy-system
      - cnpg-system
