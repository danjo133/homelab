apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: kubernetes-homelab-base

# Universal resources (no Cilium/Gateway dependency)
# For Cilium-specific resources, use overlays/cilium-bgp or overlays/cilium-gateway
resources:
  # Vault auth service account for token review
  # (Must be applied before external-secrets can authenticate to Vault)
  - vault-auth/

  # external-secrets ClusterSecretStore and ExternalSecrets
  # (Syncs secrets from Vault to Kubernetes)
  - external-secrets/

  # cert-manager ClusterIssuers and Certificates
  - cert-manager/

# Common labels
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  environment: homelab

# Common annotations
commonAnnotations:
  documentation: "https://github.com/yourusername/kss"
  owner: "homelab-team"
