apiVersion: apps/v1
kind: Deployment
metadata:
  name: globalpulse
  namespace: globalpulse
  labels:
    app: globalpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globalpulse
  template:
    metadata:
      labels:
        app: globalpulse
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10005
        fsGroup: 10005
      containers:
        - name: globalpulse
          image: harbor.example.com/library/globalpulse:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: VITE_VARIANT
              value: full
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
