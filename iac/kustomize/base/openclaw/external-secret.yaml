apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-gateway-token
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openclaw-gateway-token
    creationPolicy: Owner
  data:
    - secretKey: gateway-token
      remoteRef:
        key: openclaw/gateway-token
        property: gateway-token
