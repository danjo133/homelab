apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: init-config
          image: harbor.example.com/apps/openclaw:latest
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/extensions/searxng-search
              cp /opt/openclaw-plugins/* /home/node/.openclaw/extensions/searxng-search/
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
              subPath: openclaw
            - name: config
              mountPath: /config
              readOnly: true
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: gateway
          image: harbor.example.com/apps/openclaw:latest
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-token
                  key: gateway-token
            - name: OLLAMA_BASE_URL
              value: "http://localhost:11434"
            - name: OPENCLAW_STATE_DIR
              value: "/home/node/.openclaw"
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
              subPath: openclaw
            - name: data
              mountPath: /home/node/.local/share/signal-cli
              subPath: signal-cli
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config
          configMap:
            name: openclaw-config
        - name: tmp
          emptyDir: {}
