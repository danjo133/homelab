apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jit-elevation
  namespace: identity
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    portal.homelab/name: "JIT Elevation"
    portal.homelab/description: "Temporary privilege escalation requests"
    portal.homelab/icon: "\U0001F6E1\uFE0F"
    portal.homelab/category: "Identity"
    portal.homelab/order: "30"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jit.kss.example.com
      secretName: jit-elevation-tls
  rules:
    - host: jit.kss.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jit-elevation
                port:
                  number: 80
