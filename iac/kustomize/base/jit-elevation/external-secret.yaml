# ExternalSecret for JIT service client credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jit-service-secret
  namespace: identity
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: jit-service-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/jit-service
        property: client-secret
