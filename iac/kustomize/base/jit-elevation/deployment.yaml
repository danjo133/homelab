# JIT Role Elevation Service
# Lightweight service that handles temporary privilege escalation
# via Keycloak Token Exchange (RFC 8693)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jit-elevation
  namespace: identity
  labels:
    app: jit-elevation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jit-elevation
  template:
    metadata:
      labels:
        app: jit-elevation
    spec:
      serviceAccountName: default
      containers:
        - name: jit-elevation
          # Lightweight Python/FastAPI service
          # Build and push to Harbor, or use a generic Python image for now
          image: python:3.12-slim
          command:
            - python
            - /app/main.py
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: jit-config
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jit-service-secret
                  key: client-secret
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: app
          configMap:
            name: jit-app-code
---
# Inline application code as a ConfigMap
# In production, this would be a proper container image
apiVersion: v1
kind: ConfigMap
metadata:
  name: jit-app-code
  namespace: identity
data:
  main.py: |
    """JIT Role Elevation Service

    Handles temporary privilege escalation via Keycloak Token Exchange (RFC 8693).

    Endpoints:
      POST /api/elevate - Request elevation with current access token + reason
      GET  /health      - Health check
      GET  /api/audit   - View recent elevation events
    """

    import json
    import os
    import time
    import logging
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from urllib.request import urlopen, Request
    from urllib.parse import urlencode
    from urllib.error import URLError

    logging.basicConfig(level=os.environ.get("LOG_LEVEL", "info").upper())
    logger = logging.getLogger("jit")

    KEYCLOAK_URL = os.environ["KEYCLOAK_URL"]
    REALM = os.environ["KEYCLOAK_REALM"]
    CLIENT_ID = os.environ["CLIENT_ID"]
    CLIENT_SECRET = os.environ["CLIENT_SECRET"]
    ELIGIBLE_GROUPS = os.environ.get("ELIGIBLE_GROUPS", "platform-admins,k8s-admins").split(",")
    MAX_DURATION = int(os.environ.get("MAX_DURATION", "300"))
    COOLDOWN = int(os.environ.get("COOLDOWN", "900"))

    TOKEN_ENDPOINT = f"{KEYCLOAK_URL}/realms/{REALM}/protocol/openid-connect/token"
    USERINFO_ENDPOINT = f"{KEYCLOAK_URL}/realms/{REALM}/protocol/openid-connect/userinfo"

    # In-memory audit log and cooldown tracker
    audit_log = []
    last_elevation = {}  # user -> timestamp


    def get_userinfo(access_token):
        """Validate token and get user info from Keycloak."""
        req = Request(USERINFO_ENDPOINT, headers={
            "Authorization": f"Bearer {access_token}"
        })
        with urlopen(req) as resp:
            return json.loads(resp.read())


    def token_exchange(subject_token, requested_token_type="urn:ietf:params:oauth:token-type:access_token"):
        """Perform RFC 8693 Token Exchange to get elevated token."""
        data = urlencode({
            "grant_type": "urn:ietf:params:oauth:grant-type:token-exchange",
            "client_id": CLIENT_ID,
            "client_secret": CLIENT_SECRET,
            "subject_token": subject_token,
            "subject_token_type": "urn:ietf:params:oauth:token-type:access_token",
            "requested_token_type": requested_token_type,
            "audience": CLIENT_ID,
        }).encode()

        req = Request(TOKEN_ENDPOINT, data=data, headers={
            "Content-Type": "application/x-www-form-urlencoded"
        })
        with urlopen(req) as resp:
            return json.loads(resp.read())


    LANDING_HTML = """\
    <!DOCTYPE html>
    <html>
    <head><title>JIT Elevation Service</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #e0e0e0; background: #1a1a2e; }
      h1 { color: #c9d1d9; }
      code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
      pre { background: #0d1117; padding: 16px; border-radius: 8px; overflow-x: auto; }
      .endpoint { margin: 12px 0; }
      .method { color: #7ee787; font-weight: bold; }
      .path { color: #79c0ff; }
      a { color: #58a6ff; }
    </style></head>
    <body>
      <h1>JIT Elevation Service</h1>
      <p>Temporary privilege escalation via Keycloak Token Exchange (RFC 8693).</p>
      <h3>Endpoints</h3>
      <div class="endpoint"><span class="method">POST</span> <span class="path">/api/elevate</span> &mdash; Request elevation (requires Bearer token)</div>
      <div class="endpoint"><span class="method">GET</span>  <span class="path"><a href="/api/audit">/api/audit</a></span> &mdash; View recent elevation events</div>
      <div class="endpoint"><span class="method">GET</span>  <span class="path"><a href="/health">/health</a></span> &mdash; Health check</div>
      <h3>Usage</h3>
      <pre>curl -X POST https://jit.simple-k8s.example.com/api/elevate \\
      -H "Authorization: Bearer &lt;access_token&gt;" \\
      -H "Content-Type: application/json" \\
      -d '{"reason": "debugging pod crash", "duration": 300}'</pre>
      <p>Eligible groups: %s</p>
    </body></html>
    """ % ", ".join(ELIGIBLE_GROUPS)


    class JITHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_json(200, {"status": "ok"})
            elif self.path == "/api/audit":
                self.send_json(200, {"events": audit_log[-100:]})
            elif self.path == "/":
                self.send_response(200)
                self.send_header("Content-Type", "text/html")
                self.end_headers()
                self.wfile.write(LANDING_HTML.encode())
            else:
                self.send_json(404, {"error": "not found"})

        def do_POST(self):
            if self.path != "/api/elevate":
                self.send_json(404, {"error": "not found"})
                return

            # Read request body
            content_length = int(self.headers.get("Content-Length", 0))
            body = json.loads(self.rfile.read(content_length)) if content_length > 0 else {}

            # Extract bearer token
            auth_header = self.headers.get("Authorization", "")
            if not auth_header.startswith("Bearer "):
                self.send_json(401, {"error": "Missing Bearer token"})
                return

            access_token = auth_header[7:]
            reason = body.get("reason", "")
            duration = min(int(body.get("duration", MAX_DURATION)), MAX_DURATION)

            if not reason:
                self.send_json(400, {"error": "Reason is required"})
                return

            # Validate user identity
            try:
                userinfo = get_userinfo(access_token)
            except URLError as e:
                logger.error(f"Failed to validate token: {e}")
                self.send_json(401, {"error": "Invalid or expired token"})
                return

            username = userinfo.get("preferred_username", "unknown")
            groups = userinfo.get("groups", [])

            # Check eligibility
            eligible = any(g in ELIGIBLE_GROUPS for g in groups)
            if not eligible:
                logger.warning(f"User {username} not in eligible groups: {groups}")
                self.send_json(403, {"error": "Not authorized for elevation",
                                     "groups": groups,
                                     "eligible_groups": ELIGIBLE_GROUPS})
                return

            # Check cooldown
            now = time.time()
            last = last_elevation.get(username, 0)
            if now - last < COOLDOWN:
                remaining = int(COOLDOWN - (now - last))
                self.send_json(429, {"error": f"Cooldown active, try again in {remaining}s",
                                     "retry_after": remaining})
                return

            # Perform token exchange
            try:
                result = token_exchange(access_token)
            except URLError as e:
                logger.error(f"Token exchange failed for {username}: {e}")
                self.send_json(502, {"error": "Token exchange failed"})
                return

            # Record elevation
            last_elevation[username] = now
            event = {
                "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                "user": username,
                "reason": reason,
                "duration": duration,
                "groups": groups,
            }
            audit_log.append(event)
            logger.info(f"ELEVATION: {json.dumps(event)}")

            self.send_json(200, {
                "access_token": result.get("access_token"),
                "token_type": result.get("token_type", "Bearer"),
                "expires_in": result.get("expires_in", duration),
                "user": username,
                "elevated": True,
            })

        def send_json(self, status, data):
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(json.dumps(data).encode())

        def log_message(self, format, *args):
            logger.debug(format % args)


    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "8080"))
        server = HTTPServer(("0.0.0.0", port), JITHandler)
        logger.info(f"JIT Elevation Service starting on port {port}")
        server.serve_forever()
  requirements.txt: ""
