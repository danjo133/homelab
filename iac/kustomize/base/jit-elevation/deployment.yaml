# JIT Role Elevation Service
# Temporary privilege escalation via Keycloak Token Exchange (RFC 8693)
# Image source: iac/apps/jit-elevation/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jit-elevation
  namespace: identity
  labels:
    app: jit-elevation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jit-elevation
  template:
    metadata:
      labels:
        app: jit-elevation
    spec:
      serviceAccountName: default
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: jit-elevation
          image: harbor.example.com/apps/jit-elevation:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: jit-config
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jit-service-secret
                  key: client-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
