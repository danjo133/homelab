apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# MetalLB L2 configuration
# Apply AFTER metallb helm chart is installed (CRDs must exist first)
#
# Uses the same IP range as Cilium BGP (10.69.50.192/27) since
# MetalLB and Cilium are never active at the same time.

resources:
  - ip-address-pool.yaml
  - l2-advertisement.yaml
