# ExternalSecret for Open WebUI OIDC client credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-oidc
  namespace: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: open-webui-oidc
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: keycloak/open-webui-client
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: keycloak/open-webui-client
        property: client-secret
