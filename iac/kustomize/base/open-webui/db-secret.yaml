# ExternalSecret for Open WebUI PostgreSQL credentials
# Also templates the full DATABASE_URL for the application
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-db-credentials
  namespace: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: open-webui-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        postgres-password: "{{ .postgresPassword }}"
        database-url: "postgresql://{{ .username }}:{{ .password }}@open-webui-db-rw.open-webui.svc:5432/open-webui"
  data:
    - secretKey: username
      remoteRef:
        key: open-webui/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: open-webui/db-credentials
        property: password
    - secretKey: postgresPassword
      remoteRef:
        key: open-webui/db-credentials
        property: postgres-password
