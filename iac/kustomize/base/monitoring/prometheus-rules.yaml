# PrometheusRule CRDs — practical homelab alerts
# Picked up automatically: ruleSelectorNilUsesHelmValues: false
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
spec:
  groups:
    - name: node-alerts
      rules:
        - alert: HighCPUUsage
          expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.instance }}"
            description: "CPU usage above 85% for 15 minutes (current: {{ $value | printf \"%.1f\" }}%)."

        - alert: HighMemoryUsage
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.instance }}"
            description: "Memory usage above 85% for 15 minutes (current: {{ $value | printf \"%.1f\" }}%)."

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node has been not ready for more than 5 minutes."

    - name: pod-alerts
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 5
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} restarted {{ $value | printf \"%.0f\" }} times in 15 minutes."

        - alert: PodNotReady
          expr: min_over_time(sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"})[10m:1m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod has been in a non-ready state for more than 10 minutes."

    - name: storage-alerts
      rules:
        - alert: PVUsageHigh
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PV {{ $labels.persistentvolumeclaim }} usage high"
            description: "PV in {{ $labels.namespace }} is {{ $value | printf \"%.1f\" }}% full."

    - name: certificate-alerts
      rules:
        - alert: CertExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.name }} expiring soon"
            description: "Certificate in {{ $labels.namespace }} expires in less than 7 days."

    - name: target-alerts
      rules:
        - alert: TargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Target {{ $labels.job }}/{{ $labels.instance }} is down"
            description: "Prometheus target has been down for more than 5 minutes."

    - name: tetragon-alerts
      rules:
        - alert: TetragonPrivilegeEscalation
          expr: sum(rate(tetragon_policy_events_total{policy="privilege-escalation"}[5m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Privilege escalation attempt detected"
            description: "Tetragon detected execution of su/sudo/passwd in a container."

        - alert: TetragonKernelModuleLoad
          expr: sum(rate(tetragon_policy_events_total{policy="kernel-module-loading"}[5m])) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Kernel module loading detected"
            description: "Tetragon detected kernel module loading, which may indicate rootkit installation."

        - alert: TetragonSensitiveFileAccessSpike
          expr: sum(rate(tetragon_policy_events_total{policy="sensitive-file-access"}[5m])) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Spike in sensitive file access events"
            description: "Sustained rate of {{ $value | printf \"%.1f\" }}/sec sensitive file access events over 5 minutes."

        - alert: TetragonNoPoliciesLoaded
          expr: (count(tetragon_tracingpolicy_loaded{state="loaded"}) or vector(0)) == 0 and count(tetragon_build_info) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Tetragon has no loaded tracing policies"
            description: "No tracing policies loaded for 10+ minutes. Runtime security monitoring is inactive."

    - name: web-security-alerts
      rules:
        - alert: BruteForceAttempt
          expr: |
            sum by (service_name, url) (
              rate(http_server_request_duration_seconds_count{
                http_response_status_code="401"
              }[5m])
            ) > 0.5
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Possible brute force on {{ $labels.service_name }}{{ $labels.url }}"
            description: "Receiving >0.5 rps of 401 responses for 3+ minutes (current: {{ $value | printf \"%.2f\" }}/s)."

        - alert: CredentialStuffingDetected
          expr: |
            sum by (service_name) (
              rate(http_server_request_duration_seconds_count{
                http_response_status_code="403"
              }[5m])
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Possible credential stuffing on {{ $labels.service_name }}"
            description: "Receiving >1 rps of 403 responses for 5+ minutes (current: {{ $value | printf \"%.2f\" }}/s)."

        - alert: HighErrorRate
          expr: |
            (
              sum by (service_name) (
                rate(http_server_request_duration_seconds_count{
                  http_response_status_code=~"5.."
                }[5m])
              )
              /
              sum by (service_name) (
                rate(http_server_request_duration_seconds_count[5m])
              )
            ) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on {{ $labels.service_name }}"
            description: ">10% 5xx error rate for 5+ minutes (current: {{ $value | humanizePercentage }})."

        - alert: RequestFlood
          expr: |
            sum by (service_name) (
              rate(http_server_request_duration_seconds_count[5m])
            ) > 50
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Unusually high request rate on {{ $labels.service_name }}"
            description: ">50 rps sustained for 10+ minutes (current: {{ $value | printf \"%.1f\" }}/s)."

        - alert: SlowRequestSpike
          expr: |
            histogram_quantile(0.95,
              sum by (service_name, le) (
                rate(http_server_request_duration_seconds_bucket[5m])
              )
            ) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Slow request spike on {{ $labels.service_name }}"
            description: "P95 latency exceeds 10s for 5+ minutes (current: {{ $value | printf \"%.1f\" }}s)."

    - name: nginx-waf-alerts
      rules:
        - alert: ModSecurityBlockRate
          expr: |
            sum(rate(nginx_ingress_controller_requests{status=~"403|406"}[5m])) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ModSecurity blocking elevated traffic"
            description: ">0.5 rps of 403/406 responses for 5+ minutes, may indicate active attack being blocked."
