# ExternalSecret for Tempo MinIO S3 credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tempo-minio-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: tempo-minio-secret
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: minio/tempo-CLUSTER_NAME
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: minio/tempo-CLUSTER_NAME
        property: secret-key
