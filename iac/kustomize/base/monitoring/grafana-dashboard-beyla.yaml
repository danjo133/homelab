# Grafana dashboard: Beyla RED metrics (auto-instrumented)
# Auto-loaded by Grafana sidecar via label grafana_dashboard: "1"
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-beyla
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  beyla-red.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "spanNulls": true },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "Request Rate by Service",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{k8s_namespace=~\"$namespace\"}[$__rate_interval]))",
              "legendFormat": "{{ service_name }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "spanNulls": true },
              "unit": "percentunit",
              "max": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "Error Rate by Service",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\", k8s_namespace=~\"$namespace\"}[$__rate_interval])) / sum by (service_name) (rate(http_server_request_duration_seconds_count{k8s_namespace=~\"$namespace\"}[$__rate_interval]))",
              "legendFormat": "{{ service_name }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "spanNulls": true },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "Request Duration p50 / p95 / p99",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by (le, service_name) (rate(http_server_request_duration_seconds_bucket{k8s_namespace=~\"$namespace\"}[$__rate_interval])))",
              "legendFormat": "{{ service_name }} p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by (le, service_name) (rate(http_server_request_duration_seconds_bucket{k8s_namespace=~\"$namespace\"}[$__rate_interval])))",
              "legendFormat": "{{ service_name }} p95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le, service_name) (rate(http_server_request_duration_seconds_bucket{k8s_namespace=~\"$namespace\"}[$__rate_interval])))",
              "legendFormat": "{{ service_name }} p99"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "spanNulls": true },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "Request Rate by Status Code",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (http_response_status_code) (rate(http_server_request_duration_seconds_count{k8s_namespace=~\"$namespace\"}[$__rate_interval]))",
              "legendFormat": "{{ http_response_status_code }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1.0 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "id": 5,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Average Duration by Service",
          "type": "gauge",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_sum{k8s_namespace=~\"$namespace\"}[$__rate_interval])) / sum by (service_name) (rate(http_server_request_duration_seconds_count{k8s_namespace=~\"$namespace\"}[$__rate_interval]))",
              "legendFormat": "{{ service_name }}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["beyla", "ebpf", "red"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": ".+", "value": ".+" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(http_server_request_duration_seconds_count, k8s_namespace)",
            "includeAll": true,
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": "label_values(http_server_request_duration_seconds_count, k8s_namespace)",
            "refresh": 2,
            "type": "query"
          }
