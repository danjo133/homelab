# ExternalSecret for Grafana Keycloak OIDC client secret
# Injected as env var GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET into Grafana
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: keycloak/grafana-client
        property: client-secret
