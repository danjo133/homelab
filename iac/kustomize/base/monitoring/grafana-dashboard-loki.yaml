# Grafana dashboard: Loki log exploration
# Auto-loaded by Grafana sidecar via label grafana_dashboard: "1"
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-loki
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-logs.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "bars", "fillOpacity": 50, "stacking": { "mode": "normal" } }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "right" }, "tooltip": { "mode": "multi" } },
          "title": "Log Volume by Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (namespace) (count_over_time({namespace=~\"$namespace\"}[$__interval]))",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": { "axisCenteredZero": false, "drawStyle": "bars", "fillOpacity": 50 }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 6 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "right" }, "tooltip": { "mode": "multi" } },
          "title": "Error Rate by Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (namespace) (count_over_time({namespace=~\"$namespace\"} |~ \"(?i)(error|err|panic|fatal|exception)\" [$__interval]))",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 12 },
          "id": 3,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "title": "Log Lines",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\", container=~\"$container\"}",
              "legendFormat": ""
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["loki", "logs"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": ".+", "value": ".+" },
            "datasource": { "type": "loki", "uid": "loki" },
            "definition": "label_values(namespace)",
            "includeAll": true,
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": "label_values(namespace)",
            "refresh": 2,
            "type": "query"
          },
          {
            "current": { "selected": false, "text": ".+", "value": ".+" },
            "datasource": { "type": "loki", "uid": "loki" },
            "definition": "label_values({namespace=~\"$namespace\"}, pod)",
            "includeAll": true,
            "multi": true,
            "name": "pod",
            "options": [],
            "query": "label_values({namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "type": "query"
          },
          {
            "current": { "selected": false, "text": ".+", "value": ".+" },
            "datasource": { "type": "loki", "uid": "loki" },
            "definition": "label_values({namespace=~\"$namespace\", pod=~\"$pod\"}, container)",
            "includeAll": true,
            "multi": true,
            "name": "container",
            "options": [],
            "query": "label_values({namespace=~\"$namespace\", pod=~\"$pod\"}, container)",
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Loki Logs",
      "uid": "loki-logs"
    }
