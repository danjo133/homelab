# Grafana dashboard: Trivy Operator vulnerability overview
# Auto-loaded by Grafana sidecar via label grafana_dashboard: "1"
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-trivy
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  trivy-operator.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "High" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Medium" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Low" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Vulnerabilities by Severity",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"})",
              "legendFormat": "Critical"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(trivy_image_vulnerabilities{severity=\"High\"})",
              "legendFormat": "High"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Medium\"})",
              "legendFormat": "Medium"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Low\"})",
              "legendFormat": "Low"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "bars", "fillOpacity": 80, "stacking": { "mode": "normal" } }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Vulnerabilities by Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (namespace, severity) (trivy_image_vulnerabilities{severity=~\"Critical|High\"})",
              "legendFormat": "{{ namespace }} ({{ severity }})"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "bars", "fillOpacity": 80, "stacking": { "mode": "normal" } }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Vulnerabilities by Image",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (image_repository, severity) (trivy_image_vulnerabilities{severity=~\"Critical|High\"})",
              "legendFormat": "{{ image_repository }} ({{ severity }})"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "filterable": true }
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 12 },
          "id": 4,
          "options": { "footer": { "enablePagination": true }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Critical" }] },
          "title": "Top Vulnerable Images",
          "type": "table",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (image_repository, image_tag, namespace) (trivy_image_vulnerabilities{severity=\"Critical\"})",
              "format": "table",
              "instant": true,
              "legendFormat": "Critical"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (image_repository, image_tag, namespace) (trivy_image_vulnerabilities{severity=\"High\"})",
              "format": "table",
              "instant": true,
              "legendFormat": "High"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "image_repository": "Image",
                  "image_tag": "Tag",
                  "namespace": "Namespace",
                  "Value #A": "Critical",
                  "Value #B": "High"
                }
              }
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["trivy", "security"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Trivy Operator",
      "uid": "trivy-operator"
    }
