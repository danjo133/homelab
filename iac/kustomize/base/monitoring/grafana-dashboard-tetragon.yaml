# Grafana dashboard: Tetragon runtime security observability
# Auto-loaded by Grafana sidecar via label grafana_dashboard: "1"
# Uses Prometheus for metrics + Loki for event logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-tetragon
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tetragon.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 20,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "blue", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Loaded Policies",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(tetragon_tracingpolicy_loaded{state=\"loaded\"}) or vector(0)",
              "legendFormat": "Policies"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "orange" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Policy Events/min",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(tetragon_policy_events_total[5m])) * 60 or vector(0)",
              "legendFormat": "Events/min"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Total Events/min",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(tetragon_events_total[5m])) * 60 or vector(0)",
              "legendFormat": "Events/min"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "red" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Agent Errors (1h)",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(tetragon_errors_total[1h])) or vector(0)",
              "legendFormat": "Errors"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 21,
          "title": "Event Trends",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "pointSize": 5, "spanNulls": true, "stacking": { "mode": "none" } },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 6 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "Events by Type",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (type) (rate(tetragon_events_total[5m]))",
              "legendFormat": "{{ type }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "pointSize": 5, "spanNulls": true, "stacking": { "mode": "none" } },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 13 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "Policy Events by Policy",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (policy) (rate(tetragon_policy_events_total[5m]))",
              "legendFormat": "{{ policy }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "pointSize": 5, "spanNulls": true, "stacking": { "mode": "none" } },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 13 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "Policy Events by Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (namespace) (rate(tetragon_policy_events_total[5m]))",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 20 },
          "id": 23,
          "title": "Security Event Logs",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 21 },
          "id": 10,
          "options": {
            "dedupStrategy": "exact",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "title": "Critical Security Events (privilege escalation, kernel modules, namespace escape)",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"kube-system\", container=\"export-stdout\"} |~ \"privilege-escalation|kernel-module-loading|namespace-escape\" | json | process_kprobe_policy_name != \"\" | line_format \"CRITICAL [{{ .process_kprobe_policy_name }}] {{ .process_kprobe_function_name }} | ns={{ .process_kprobe_process_pod_namespace }} pod={{ .process_kprobe_process_pod_name }} binary={{ .process_kprobe_process_binary }} node={{ .node_name }}\""
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 31 },
          "id": 11,
          "options": {
            "dedupStrategy": "exact",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "title": "All Policy Events",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"kube-system\", container=\"export-stdout\"} |~ \"policy_name\" | json | process_kprobe_policy_name != \"\" | line_format \"[{{ .process_kprobe_policy_name }}] {{ .process_kprobe_function_name }} | ns={{ .process_kprobe_process_pod_namespace }} pod={{ .process_kprobe_process_pod_name }} binary={{ .process_kprobe_process_binary }} node={{ .node_name }}\""
            }
          ]
        },
        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 43 },
          "id": 22,
          "title": "Agent Health",
          "type": "row",
          "panels": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "palette-classic" },
                  "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "spanNulls": true },
                  "unit": "ops"
                },
                "overrides": []
              },
              "gridPos": { "h": 7, "w": 12, "x": 0, "y": 44 },
              "id": 8,
              "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
              "title": "Ring Buffer Events Lost",
              "type": "timeseries",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "rate(tetragon_observer_ringbuf_events_lost_total[5m])",
                  "legendFormat": "{{ instance }}"
                }
              ]
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "palette-classic" },
                  "custom": { "axisCenteredZero": false, "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "spanNulls": true }
                },
                "overrides": []
              },
              "gridPos": { "h": 7, "w": 12, "x": 12, "y": 44 },
              "id": 9,
              "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
              "title": "Process Cache Utilization",
              "type": "timeseries",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "tetragon_process_cache_size",
                  "legendFormat": "Size ({{ instance }})"
                },
                {
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "tetragon_process_cache_capacity",
                  "legendFormat": "Capacity ({{ instance }})"
                }
              ]
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["tetragon", "security", "ebpf"],
      "templating": { "list": [] },
      "time": { "from": "now-3h", "to": "now" },
      "title": "Tetragon Runtime Security",
      "uid": "tetragon-runtime"
    }
