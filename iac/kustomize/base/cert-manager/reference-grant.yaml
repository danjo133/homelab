# ReferenceGrant - Allow Gateway to reference cert-manager secrets
#
# This allows Gateways in kube-system namespace to reference
# Secrets in cert-manager namespace (like the wildcard certificate)
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-secret-reference
  namespace: cert-manager
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: kube-system
  to:
    - group: ""
      kind: Secret
      name: wildcard-overkill-tls
