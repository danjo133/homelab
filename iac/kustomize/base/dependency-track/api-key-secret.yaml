apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dependency-track-api-key
  namespace: dependency-track
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: dependency-track-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: dependency-track/api-key
        property: api-key
