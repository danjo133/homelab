# ExternalSecret for MCPO credentials (GitLab token, API key)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcpo-credentials
  namespace: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: mcpo-credentials
    creationPolicy: Owner
  data:
    - secretKey: gitlab-token
      remoteRef:
        key: mcpo/credentials
        property: gitlab-token
    - secretKey: api-key
      remoteRef:
        key: mcpo/credentials
        property: api-key
