# ClusterSecretStore - Connects external-secrets to Vault
#
# This store uses Kubernetes authentication to access Vault.
# The external-secrets service account authenticates using its JWT token.
#
# Prerequisites:
# - Vault Kubernetes auth must be configured (run bootstrap-vault-k8s.sh)
# - external-secrets operator must be installed

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      # Vault server address
      server: "https://vault.support.example.com"

      # Path to KV v2 secrets engine
      path: "secret"

      # KV version
      version: "v2"

      # Authentication using Kubernetes service account
      auth:
        kubernetes:
          # Mount path of Kubernetes auth in Vault
          mountPath: "kubernetes"

          # Role created in Vault for external-secrets
          role: "external-secrets"

          # Service account used by external-secrets operator
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"

      # Optional: Skip TLS verification (only for testing)
      # caProvider:
      #   type: "ConfigMap"
      #   name: "vault-ca"
      #   namespace: "external-secrets"
      #   key: "ca.crt"
