# ExternalSecret for OAuth2-Proxy credentials
# Combines client secret from Keycloak and cookie secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-credentials
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-credentials
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: keycloak/oauth2-proxy-client
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: keycloak/oauth2-proxy-client
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: oauth2-proxy
        property: cookie-secret
