apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cilium CRDs for BGP and LoadBalancer IP allocation
# These files are generated from iac/network/config.yaml
# Run: make generate-network-config

resources:
  - 01-loadbalancer-pool.yaml
  - 02-cilium-bgp-advertisement.yaml
  - 03-cilium-bgp-peerconfig.yaml
  - 04-cilium-bgp-clusterconfig.yaml
