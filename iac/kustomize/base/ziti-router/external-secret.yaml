# ExternalSecret — Ziti router enrollment JWT from Vault
#
# The ziti-router Helm chart reads the enrollment JWT from this secret
# via enrollmentJwtFromSecret: true / enrollmentJwtSecretName: ziti-router-jwt
#
# Vault path: secret/ziti/router

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ziti-router-jwt
  namespace: ziti-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: ziti-router-jwt
    creationPolicy: Owner
  data:
    - secretKey: enrollment_token
      remoteRef:
        key: ziti/router
        property: enrollment_token
