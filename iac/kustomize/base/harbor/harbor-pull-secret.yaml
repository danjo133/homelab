# ExternalSecret - Harbor imagePullSecret from Vault
#
# Creates a kubernetes.io/dockerconfigjson secret in each namespace
# so pods can pull images through the Harbor proxy caches.
#
# Vault path: secret/harbor/admin
# Namespaces: default, monitoring, keycloak, argocd, longhorn-system, trivy-system

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: harbor-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.support.example.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: harbor/admin
        property: username
    - secretKey: password
      remoteRef:
        key: harbor/admin
        property: password

