# ExternalSecret for Headlamp OIDC secret (in headlamp namespace)
# Provides all keys expected by the headlamp chart's OIDC secret
# issuerURL is patched per-cluster via kustomize overlay
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: headlamp-oidc
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        clientID: headlamp
        clientSecret: "{{ .clientSecret }}"
        issuerURL: PLACEHOLDER
        scopes: "openid,profile,email,groups"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: keycloak/headlamp-client
        property: client-secret
