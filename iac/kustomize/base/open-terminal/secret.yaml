# ExternalSecret for Open Terminal API key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-terminal-api-key
  namespace: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: open-terminal-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: open-terminal/api-key
        property: api-key
