# ExternalSecret — Teleport join token from Vault
#
# The teleport-kube-agent Helm chart reads the join token from this secret
# via joinTokenSecret.name: teleport-join-token
#
# Vault path: secret/teleport/agent

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teleport-join-token
  namespace: teleport
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: teleport-join-token
    creationPolicy: Owner
  data:
    - secretKey: auth-token
      remoteRef:
        key: teleport/agent
        property: join-token
