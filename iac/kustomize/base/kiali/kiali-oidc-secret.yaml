# ExternalSecret for Kiali OIDC client secret (in istio-system namespace)
# Used by kiali-server helm chart for native OpenID Connect authentication
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiali
  namespace: istio-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: kiali
    creationPolicy: Owner
  data:
    - secretKey: oidc-secret
      remoteRef:
        key: keycloak/kiali-client
        property: client-secret
