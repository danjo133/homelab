# Example HTTPRoute - Shows how to expose a service via Gateway
#
# This is a template showing how to route traffic from the Gateway
# to a backend service. Copy and modify for your own services.
#
# ExternalDNS will automatically create DNS records for the hostname.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: default
  annotations:
    # ExternalDNS annotation for automatic DNS record creation
    external-dns.alpha.kubernetes.io/hostname: example.support.example.com
spec:
  # Parent Gateway to attach to
  parentRefs:
    - name: main-gateway
      namespace: kube-system

  # Hostname this route handles
  hostnames:
    - "example.support.example.com"

  # Routing rules
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: example-service
          port: 80

---
