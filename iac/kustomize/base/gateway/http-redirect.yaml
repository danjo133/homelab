# HTTP to HTTPS Redirect
#
# This HTTPRoute catches all HTTP traffic and redirects to HTTPS.
# Attach this to the HTTP listener of the Gateway.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: kube-system
spec:
  parentRefs:
    - name: main-gateway
      namespace: kube-system
      sectionName: http  # Only attach to HTTP listener

  hostnames:
    - "*.support.example.com"

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
