apiVersion: apps/v1
kind: Deployment
metadata:
  name: architecture
  namespace: kube-public
  labels:
    app: architecture
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architecture
  template:
    metadata:
      labels:
        app: architecture
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: architecture
          image: harbor.example.com/apps/architecture:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /run
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 10Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 1Mi
