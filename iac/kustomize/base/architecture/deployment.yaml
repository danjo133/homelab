apiVersion: apps/v1
kind: Deployment
metadata:
  name: architecture
  namespace: kube-public
  labels:
    app: architecture
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architecture
  template:
    metadata:
      labels:
        app: architecture
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: architecture
          image: harbor.support.example.com/kss/architecture:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
