apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: architecture
  namespace: kube-public
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth2-proxy.CLUSTER_DOMAIN/oauth2/start?rd=$scheme://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups,X-Auth-Request-Access-Token"
    portal.homelab/name: "Architecture"
    portal.homelab/description: "Infrastructure architecture diagrams"
    portal.homelab/icon: "\U0001F3D7"
    portal.homelab/category: "Platform"
    portal.homelab/order: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - architecture.CLUSTER_DOMAIN
      secretName: architecture-tls
  rules:
    - host: architecture.CLUSTER_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: architecture
                port:
                  number: 80
