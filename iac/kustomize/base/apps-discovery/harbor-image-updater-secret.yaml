# ExternalSecret — Harbor credentials for ArgoCD Image Updater
# Image Updater uses this to poll Harbor for new image tags
# Vault path: secret/harbor/apps-pull
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-image-updater-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: harbor-image-updater-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.example.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: harbor/apps-pull
        property: username
    - secretKey: password
      remoteRef:
        key: harbor/apps-pull
        property: password
