apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Keycloak Broker IdP - in-cluster Keycloak instance
# Federates from root IdP on support VM
# Realm configuration managed by OpenTofu (tofu/modules/keycloak-broker)

resources:
  - keycloak-db-cluster.yaml
  - keycloak-instance.yaml
  - keycloak-ingress.yaml
  # NOTE: keycloak-db-secret.yaml and argocd-oidc-secret.yaml are deployed
  # during bootstrap (external-secrets kustomize) because they are needed
  # before the cnpg Cluster and ArgoCD can start.
