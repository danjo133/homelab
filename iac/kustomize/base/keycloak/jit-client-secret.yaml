# ExternalSecret for JIT service client secret (in keycloak namespace)
# Injected into Keycloak pod as env var for realm import ${JIT_CLIENT_SECRET} substitution
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jit-client-secret
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: jit-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/jit-service
        property: client-secret
