# ExternalSecret for upstream IdP broker-client secret
# Used by broker Keycloak to federate from root IdP
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: upstream-idp-secret
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: upstream-idp-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/broker-client
        property: client-secret
