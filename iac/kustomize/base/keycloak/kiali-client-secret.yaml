# ExternalSecret for Kiali OIDC client secret (in keycloak namespace)
# Injected as env var into Keycloak pod for realm import ${KIALI_CLIENT_SECRET}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiali-client-secret
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: kiali-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/kiali-client
        property: client-secret
