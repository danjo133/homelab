# ExternalSecret for ArgoCD OIDC client secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-client-secret
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: argocd-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/argocd-client
        property: client-secret
