# ExternalSecret for Headlamp OIDC client secret (in keycloak namespace)
# Injected as env var into Keycloak pod for realm import ${HEADLAMP_CLIENT_SECRET}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: headlamp-client-secret
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: headlamp-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/headlamp-client
        property: client-secret
