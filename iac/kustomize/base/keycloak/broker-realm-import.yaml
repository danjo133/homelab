# KeycloakRealmImport - Broker realm configuration
# Defines: realm, identity provider (upstream), clients, roles, groups
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: broker-realm
  namespace: keycloak
spec:
  keycloakCRName: broker-keycloak
  realm:
    realm: broker
    enabled: true
    displayName: "Broker IdP"
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    resetPasswordAllowed: false
    editUsernameAllowed: false

    # ========================================================================
    # Realm Roles
    # ========================================================================
    roles:
      realm:
        - name: platform-admin
          description: "Full admin of everything (k8s + web + apps)"
        - name: k8s-admin
          description: "Full Kubernetes cluster-admin"
        - name: k8s-operator
          description: "Read-only Kubernetes operator (pods, logs, deploys)"
        - name: web-admin
          description: "Admin of web UIs (Grafana, Hubble, ArgoCD)"
        - name: web-operator
          description: "Read/use web UIs"
        - name: app-user
          description: "Regular user of deployed apps"

    # ========================================================================
    # Groups with default role mappings
    # ========================================================================
    groups:
      - name: platform-admins
        realmRoles:
          - platform-admin
      - name: k8s-admins
        realmRoles:
          - k8s-admin
      - name: k8s-operators
        realmRoles:
          - k8s-operator
      - name: web-admins
        realmRoles:
          - web-admin
      - name: web-operators
        realmRoles:
          - web-operator
      - name: app-users
        realmRoles:
          - app-user

    # ========================================================================
    # Client Scopes
    # ========================================================================
    # Keycloak operator realm import does NOT auto-create built-in scopes,
    # so we must define openid/profile/email/roles explicitly.
    clientScopes:
      - name: openid
        description: "OpenID Connect scope"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
        protocolMappers:
          - name: sub
            protocol: openid-connect
            protocolMapper: oidc-sub-mapper
            config:
              introspection.token.claim: "true"
              access.token.claim: "true"
      - name: profile
        description: "User profile"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
        protocolMappers:
          - name: username
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "username"
              claim.name: "preferred_username"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
          - name: full name
            protocol: openid-connect
            protocolMapper: oidc-full-name-mapper
            config:
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
      - name: email
        description: "User email"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
        protocolMappers:
          - name: email
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "email"
              claim.name: "email"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
          - name: email verified
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              user.attribute: "emailVerified"
              claim.name: "email_verified"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
      - name: roles
        description: "User realm and client roles"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "false"
        protocolMappers:
          - name: realm roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            config:
              multivalued: "true"
              claim.name: "realm_access.roles"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
      - name: groups
        description: "Group membership"
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
        protocolMappers:
          - name: group-membership
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            config:
              full.path: "false"
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: "groups"
              userinfo.token.claim: "true"

    # ========================================================================
    # Default client scopes for the realm
    # ========================================================================
    defaultDefaultClientScopes:
      - openid
      - profile
      - email
      - roles
      - groups

    # ========================================================================
    # Identity Providers (federation from root IdP)
    # ========================================================================
    identityProviders:
      - alias: upstream
        displayName: "Corporate Login"
        providerId: oidc
        enabled: true
        trustEmail: true
        firstBrokerLoginFlowAlias: "first broker login"
        config:
          authorizationUrl: "https://idp.support.example.com/realms/upstream/protocol/openid-connect/auth"
          tokenUrl: "https://idp.support.example.com/realms/upstream/protocol/openid-connect/token"
          userInfoUrl: "https://idp.support.example.com/realms/upstream/protocol/openid-connect/userinfo"
          jwksUrl: "https://idp.support.example.com/realms/upstream/protocol/openid-connect/certs"
          logoutUrl: "https://idp.support.example.com/realms/upstream/protocol/openid-connect/logout"
          issuer: "https://idp.support.example.com/realms/upstream"
          clientId: "broker-client"
          clientAuthMethod: "client_secret_post"
          clientSecret: "${UPSTREAM_CLIENT_SECRET}"
          syncMode: "IMPORT"
          defaultScope: "openid profile email roles"
          validateSignature: "true"
          useJwksUrl: "true"

    # ========================================================================
    # Identity Provider Mappers (map upstream roles to broker groups)
    # ========================================================================
    identityProviderMappers:
      - name: "upstream-admin-to-platform-admins"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"admin"}]'
          are.claim.values.regex: "false"
          group: "/platform-admins"
      - name: "upstream-admin-to-k8s-admins"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"admin"}]'
          are.claim.values.regex: "false"
          group: "/k8s-admins"
      - name: "upstream-admin-to-k8s-operators"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"admin"}]'
          are.claim.values.regex: "false"
          group: "/k8s-operators"
      - name: "upstream-admin-to-web-admins"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"admin"}]'
          are.claim.values.regex: "false"
          group: "/web-admins"
      - name: "upstream-admin-to-web-operators"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"admin"}]'
          are.claim.values.regex: "false"
          group: "/web-operators"
      - name: "upstream-admin-to-app-users"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"admin"}]'
          are.claim.values.regex: "false"
          group: "/app-users"
      - name: "upstream-user-to-app-users"
        identityProviderAlias: upstream
        identityProviderMapper: "oidc-advanced-group-idp-mapper"
        config:
          syncMode: "INHERIT"
          claims: '[{"key":"realm_access.roles","value":"user"}]'
          are.claim.values.regex: "false"
          group: "/app-users"

    # ========================================================================
    # Clients
    # ========================================================================
    clients:
      # kubectl / kubelogin - public client for OIDC kubectl auth
      - clientId: kubernetes
        name: "Kubernetes kubectl"
        enabled: true
        protocol: openid-connect
        publicClient: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        rootUrl: ""
        redirectUris:
          - "http://localhost:8000"
          - "http://localhost:18000"
          - "http://127.0.0.1:8000"
          - "http://127.0.0.1:18000"
        webOrigins:
          - "http://localhost:8000"
          - "http://localhost:18000"
        defaultClientScopes:
          - openid
          - profile
          - email
          - roles
          - groups

      # OAuth2-Proxy - confidential client for web SSO
      - clientId: oauth2-proxy
        name: "OAuth2 Proxy (Web SSO)"
        secret: "${OAUTH2_PROXY_CLIENT_SECRET}"
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        redirectUris:
          - "https://oauth2-proxy.simple-k8s.example.com/oauth2/callback"
          - "https://*.simple-k8s.example.com/oauth2/callback"
        webOrigins:
          - "+"
        defaultClientScopes:
          - groups

      # ArgoCD - confidential client for ArgoCD OIDC
      - clientId: argocd
        name: "ArgoCD"
        secret: "${ARGOCD_CLIENT_SECRET}"
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        redirectUris:
          - "https://argocd.simple-k8s.example.com/auth/callback"
        webOrigins:
          - "https://argocd.simple-k8s.example.com"
        defaultClientScopes:
          - groups

      # Grafana - confidential client for Grafana OIDC
      - clientId: grafana
        name: "Grafana"
        secret: "${GRAFANA_CLIENT_SECRET}"
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: false
        redirectUris:
          - "https://grafana.simple-k8s.example.com/login/generic_oauth"
        webOrigins:
          - "https://grafana.simple-k8s.example.com"
        defaultClientScopes:
          - groups

      # JIT Elevation Service - confidential client with token-exchange
      - clientId: jit-service
        name: "JIT Role Elevation Service"
        secret: "${JIT_CLIENT_SECRET}"
        enabled: true
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: true
        authorizationServicesEnabled: false
        defaultClientScopes:
          - groups
        attributes:
          oidc.token.exchange.enabled: "true"
