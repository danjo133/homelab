# Keycloak CR - Broker IdP instance
# Managed by the Keycloak Operator
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: broker-keycloak
  namespace: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-db-rw
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password
  features:
    enabled:
      - token-exchange
  http:
    httpEnabled: true
  hostname:
    # Will be overridden per-cluster via kustomize overlay
    hostname: auth.kss.example.com
  proxy:
    headers: xforwarded
  # Ingress managed separately (keycloak-ingress.yaml) for proper TLS/cert-manager support
  ingress:
    enabled: false
