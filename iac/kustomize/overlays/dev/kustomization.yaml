apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: kubernetes-homelab-dev

# Base to include
bases:
  - ../base

# Overlays for development environment
namePrefix: dev-
nameSuffix: ""

# Development-specific labels
commonLabels:
  environment: dev
  owner: homelab-team

# Development-specific annotations
commonAnnotations:
  description: "Development environment"

# Resource limits for dev
replicas:
  - name: cert-manager
    count: 1

# Patches for development (less resources, etc)
patches: []

# ConfigMap generator for environment variables
configMapGenerator:
  - name: homelab-config
    literals:
      - ENVIRONMENT=dev
      - LOG_LEVEL=debug
      - METRICS_ENABLED=true

# Namespace
namespace: default
