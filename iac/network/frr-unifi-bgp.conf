# FRR Configuration for UniFi Dream Machine
# Generated from config.yaml + cluster.yaml files — do not edit directly
# Run: make generate-network-config
#
# Upload this file via: Settings > Routing > BGP
#
# This configures the router to:
# - Run BGP with ASN 64512
# - Peer with Kubernetes nodes running Cilium
# - Accept LoadBalancer VIP routes advertised by Cilium
#
# Network: VLAN 50 (10.69.50.0/24)

router bgp 64512
  bgp router-id 10.69.50.1
  no bgp ebgp-requires-policy

  network 10.69.50.208/28


  # kcs (ASN 64513)
  neighbor 10.69.50.50 remote-as 64513
  neighbor 10.69.50.50 description kcs-master
  neighbor 10.69.50.50 passive
  neighbor 10.69.50.61 remote-as 64513
  neighbor 10.69.50.61 description kcs-worker-1
  neighbor 10.69.50.61 passive
  neighbor 10.69.50.62 remote-as 64513
  neighbor 10.69.50.62 description kcs-worker-2
  neighbor 10.69.50.62 passive
  neighbor 10.69.50.63 remote-as 64513
  neighbor 10.69.50.63 description kcs-worker-3
  neighbor 10.69.50.63 passive


  address-family ipv4 unicast
    neighbor 10.69.50.50 activate
    neighbor 10.69.50.50 soft-reconfiguration inbound
    neighbor 10.69.50.61 activate
    neighbor 10.69.50.61 soft-reconfiguration inbound
    neighbor 10.69.50.62 activate
    neighbor 10.69.50.62 soft-reconfiguration inbound
    neighbor 10.69.50.63 activate
    neighbor 10.69.50.63 soft-reconfiguration inbound

    maximum-paths 4
  exit-address-family
