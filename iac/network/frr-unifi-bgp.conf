# FRR Configuration for UniFi Dream Machine
# Generated from config.yaml - Do not edit directly
# Run: make generate-network-config
#
# Upload this file via: Settings > Routing > BGP
#
# This configures the router to:
# - Run BGP with ASN 64512
# - Peer with Kubernetes nodes running Cilium (ASN 64513)
# - Accept LoadBalancer VIP routes advertised by Cilium
#
# Network: VLAN 50 (10.69.50.0/24)
# LoadBalancer VIPs: 10.69.50.192-223

router bgp 64512
  bgp router-id 10.69.50.1
  no bgp ebgp-requires-policy

  network 10.69.50.192/27

  neighbor 10.69.50.20 remote-as 64513
  neighbor 10.69.50.20 description k8s-master
  neighbor 10.69.50.20 passive
  neighbor 10.69.50.31 remote-as 64513
  neighbor 10.69.50.31 description k8s-worker-1
  neighbor 10.69.50.31 passive
  neighbor 10.69.50.32 remote-as 64513
  neighbor 10.69.50.32 description k8s-worker-2
  neighbor 10.69.50.32 passive
  neighbor 10.69.50.33 remote-as 64513
  neighbor 10.69.50.33 description k8s-worker-3
  neighbor 10.69.50.33 passive


  address-family ipv4 unicast
    neighbor 10.69.50.20 activate
    neighbor 10.69.50.20 soft-reconfiguration inbound
    neighbor 10.69.50.31 activate
    neighbor 10.69.50.31 soft-reconfiguration inbound
    neighbor 10.69.50.32 activate
    neighbor 10.69.50.32 soft-reconfiguration inbound
    neighbor 10.69.50.33 activate
    neighbor 10.69.50.33 soft-reconfiguration inbound

    maximum-paths 4
  exit-address-family
