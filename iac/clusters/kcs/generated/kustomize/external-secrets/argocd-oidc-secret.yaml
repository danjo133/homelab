# ExternalSecret for ArgoCD OIDC client secret (in argocd namespace)
# ArgoCD references this as $argocd-oidc-secret:client-secret in oidc.config
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: client-secret
      remoteRef:
        key: keycloak/argocd-client
        property: client-secret
