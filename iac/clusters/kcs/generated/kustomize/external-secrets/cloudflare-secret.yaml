# ExternalSecret - Syncs Cloudflare API token from Vault to Kubernetes
#
# Creates the cloudflare-api-token Secret in multiple namespaces:
# - cert-manager: For Let's Encrypt DNS-01 challenges
# - external-dns: For automatic DNS record management

---
# Cloudflare API token for cert-manager
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  # How often to sync
  refreshInterval: 1h

  # Reference to ClusterSecretStore
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore

  # Target Secret to create
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Key name expected by cert-manager
        api-token: "{{ .apiToken }}"

  # Data to fetch from Vault
  data:
    - secretKey: apiToken
      remoteRef:
        key: cloudflare
        property: api-token

---
# Cloudflare API token for external-dns
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault
    kind: ClusterSecretStore

  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Key name expected by external-dns Cloudflare provider
        api-token: "{{ .apiToken }}"

  data:
    - secretKey: apiToken
      remoteRef:
        key: cloudflare
        property: api-token
