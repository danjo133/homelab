apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Auto-generated from cluster.yaml — do not edit
# Cluster: kcs — Cluster Setup with per-cluster config

resources:
  - ../../../../../kustomize/base/cluster-setup

patches:
  - target:
      kind: ConfigMap
      name: cluster-setup-config
    patch: |
      - op: replace
        path: /data/CLUSTER_NAME
        value: "kcs"
      - op: replace
        path: /data/CLUSTER_DOMAIN
        value: "kcs.example.com"
      - op: replace
        path: /data/KEYCLOAK_URL
        value: "https://auth.kcs.example.com"
      - op: replace
        path: /data/API_SERVER
        value: "https://kcs-master.kcs.example.com:6443"
  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: cluster-setup
        namespace: identity
      $patch: delete
