# ClusterIssuer for Let's Encrypt with Cloudflare DNS-01 challenge
#
# This issuer can create certificates for any domain in example.com
# using DNS-01 challenge via Cloudflare API.
#
# Prerequisites:
# - cert-manager must be installed
# - Cloudflare API token secret must exist in cert-manager namespace
#
# Create the secret:
#   kubectl create secret generic cloudflare-api-token \
#     --namespace cert-manager \
#     --from-literal=api-token=<your-cloudflare-api-token>

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production Let's Encrypt server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for certificate expiration notifications
    email: letsencrypt@example.com
    # Secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            # Cloudflare API token with Zone:Read and DNS:Edit permissions
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        # Only use this solver for example.com domain
        selector:
          dnsZones:
            - example.com

---
# Staging issuer for testing (higher rate limits)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: letsencrypt@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - example.com
