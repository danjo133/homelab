apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Auto-generated from cluster.yaml — do not edit
# Cluster: kcs — Keycloak broker with per-cluster hostname

resources:
  - ../../../../../kustomize/base/keycloak

patches:
  - target:
      kind: Keycloak
      name: broker-keycloak
    patch: |
      - op: replace
        path: /spec/hostname/hostname
        value: auth.mesh-k8s.example.com
  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: broker-keycloak
        namespace: keycloak
      $patch: delete
  # Per-cluster redirect URIs for OIDC clients
  # Client index: 0=kubernetes, 1=oauth2-proxy, 2=argocd, 3=grafana, 4=jit-service, 5=kiali, 6=headlamp
  - target:
      kind: KeycloakRealmImport
      name: broker-realm
    patch: |
      - op: replace
        path: /spec/realm/clients/0/redirectUris
        value:
          - "http://localhost:8000"
          - "http://localhost:18000"
          - "http://127.0.0.1:8000"
          - "http://127.0.0.1:18000"
          - "https://jit.mesh-k8s.example.com/*"
      - op: replace
        path: /spec/realm/clients/0/webOrigins
        value:
          - "http://localhost:8000"
          - "http://localhost:18000"
          - "https://jit.mesh-k8s.example.com"
      - op: replace
        path: /spec/realm/clients/1/redirectUris
        value:
          - "https://oauth2-proxy.mesh-k8s.example.com/oauth2/callback"
          - "https://*.mesh-k8s.example.com/oauth2/callback"
      - op: replace
        path: /spec/realm/clients/2/redirectUris
        value:
          - "https://argocd.mesh-k8s.example.com/auth/callback"
      - op: replace
        path: /spec/realm/clients/2/webOrigins
        value:
          - "https://argocd.mesh-k8s.example.com"
      - op: replace
        path: /spec/realm/clients/3/redirectUris
        value:
          - "https://grafana.mesh-k8s.example.com/login/generic_oauth"
      - op: replace
        path: /spec/realm/clients/3/webOrigins
        value:
          - "https://grafana.mesh-k8s.example.com"
      - op: replace
        path: /spec/realm/clients/5/redirectUris
        value:
          - "https://kiali.mesh-k8s.example.com/*"
      - op: replace
        path: /spec/realm/clients/5/webOrigins
        value:
          - "https://kiali.mesh-k8s.example.com"
      - op: replace
        path: /spec/realm/clients/6/redirectUris
        value:
          - "https://k8s.mesh-k8s.example.com/*"
      - op: replace
        path: /spec/realm/clients/6/webOrigins
        value:
          - "https://k8s.mesh-k8s.example.com"
