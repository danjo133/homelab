# ExternalSecret for Keycloak PostgreSQL credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-db-credentials
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: keycloak-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: keycloak/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: keycloak/db-credentials
        property: password
    - secretKey: postgres-password
      remoteRef:
        key: keycloak/db-credentials
        property: admin-password
