apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Auto-generated from cluster.yaml — do not edit
# Cluster: kss — JIT Elevation with per-cluster hostname

resources:
  - ../../../../../kustomize/base/jit-elevation

patches:
  - target:
      kind: ConfigMap
      name: jit-config
    patch: |
      - op: replace
        path: /data/KEYCLOAK_URL
        value: "https://auth.simple-k8s.example.com"
  - target:
      kind: Ingress
      name: jit-elevation
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: jit.simple-k8s.example.com
      - op: replace
        path: /spec/rules/0/host
        value: jit.simple-k8s.example.com
