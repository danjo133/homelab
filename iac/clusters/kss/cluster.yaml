# CNI: "default" (Canal + kube-proxy) or "cilium"
cni: default

# Helmfile environment: default, bgp-simple, gateway-bgp, base
helmfile_env: default

loadbalancer:
  cidr: "10.69.50.192/28"

vault:
  auth_mount: kubernetes
  namespace: kss

bgp:
  asn: 64514

# OIDC authentication via broker Keycloak
oidc:
  enabled: true
  issuer_url: "https://auth.kss.example.com/realms/broker"
  client_id: kubernetes

# Identity system configuration
identity:
  root_idp_url: "https://idp.support.example.com"
  broker_realm: broker
