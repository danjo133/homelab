# CI pipeline for mirrored GitHub repos
# Referenced via ci_config_path in GitLab project settings (set by github-mirror sync)
# Builds container images with Kaniko and pushes to Harbor apps/ project
#
# Required group CI/CD variables (set by github-mirror-sync):
#   HARBOR_REGISTRY      - Harbor hostname
#   HARBOR_PUSH_USER     - Harbor robot account username
#   HARBOR_PUSH_PASSWORD - Harbor robot account password

stages:
  - build

build:
  stage: build
  image:
    name: ${HARBOR_REGISTRY}/gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules:
    - exists:
        - Dockerfile
  script:
    - IMAGE_NAME=$(echo "$CI_PROJECT_NAME" | tr 'A-Z' 'a-z')
    - mkdir -p /kaniko/.docker
    - >-
      AUTH=$(printf '%s:%s' "${HARBOR_PUSH_USER}" "${HARBOR_PUSH_PASSWORD}" | base64 | tr -d '\n')
      && printf '{"auths":{"%s":{"auth":"%s"}}}' "${HARBOR_REGISTRY}" "$AUTH"
      > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${HARBOR_REGISTRY}/apps/${IMAGE_NAME}:${CI_COMMIT_SHA}"
      --destination "${HARBOR_REGISTRY}/apps/${IMAGE_NAME}:latest"
      --cache=true
      --cache-repo "${HARBOR_REGISTRY}/apps/${IMAGE_NAME}/cache"
      --snapshot-mode=redo
  tags:
    - docker
    - kaniko
