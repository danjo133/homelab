# CI pipeline for custom apps in iac/apps/
# Builds container images with Kaniko and pushes to Harbor apps/ project.
# ArgoCD Image Updater detects new SHA tags and auto-deploys.
#
# Required CI variables (set in GitLab project settings):
#   HARBOR_REGISTRY     - Harbor hostname (e.g., harbor.example.com)
#   HARBOR_PUSH_USER    - Harbor robot account username
#   HARBOR_PUSH_PASSWORD - Harbor robot account password

stages:
  - build

.kaniko-build:
  stage: build
  image:
    name: ${HARBOR_REGISTRY}/gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - >-
      AUTH=$(printf '%s:%s' "${HARBOR_PUSH_USER}" "${HARBOR_PUSH_PASSWORD}" | base64 | tr -d '\n')
      && printf '{"auths":{"%s":{"auth":"%s"}}}' "${HARBOR_REGISTRY}" "$AUTH"
      > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}/${APP_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/${APP_DIR}/Dockerfile"
      --destination "${HARBOR_REGISTRY}/apps/${APP_NAME}:${CI_COMMIT_SHA}"
      --destination "${HARBOR_REGISTRY}/apps/${APP_NAME}:latest"
      --cache=true
      --cache-repo "${HARBOR_REGISTRY}/apps/${APP_NAME}/cache"
      --snapshot-mode=redo
  tags:
    - docker
    - kaniko
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - ${APP_DIR}/**/*

build-portal:
  extends: .kaniko-build
  variables:
    APP_NAME: portal
    APP_DIR: iac/apps/portal

build-jit-elevation:
  extends: .kaniko-build
  variables:
    APP_NAME: jit-elevation
    APP_DIR: iac/apps/jit-elevation

build-cluster-setup:
  extends: .kaniko-build
  variables:
    APP_NAME: cluster-setup
    APP_DIR: iac/apps/cluster-setup

build-architecture:
  extends: .kaniko-build
  variables:
    APP_NAME: architecture
    APP_DIR: iac/apps/architecture

build-openclaw:
  extends: .kaniko-build
  variables:
    APP_NAME: openclaw
    APP_DIR: iac/apps/openclaw
