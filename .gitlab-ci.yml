# CI pipeline for custom apps in iac/apps/
# Builds container images with Kaniko and pushes to Harbor apps/ project.
# ArgoCD Image Updater detects new SHA tags and auto-deploys.
#
# Required CI variables (set in GitLab project settings):
#   HARBOR_REGISTRY     - Harbor hostname (e.g., harbor.example.com)
#   HARBOR_PUSH_USER    - Harbor robot account username
#   HARBOR_PUSH_PASSWORD - Harbor robot account password

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/SAST-IaC.gitlab-ci.yml

stages:
  - build
  - test
  - sbom-upload

.kaniko-build:
  stage: build
  image:
    name: ${HARBOR_REGISTRY}/gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - >-
      AUTH=$(printf '%s:%s' "${HARBOR_PUSH_USER}" "${HARBOR_PUSH_PASSWORD}" | base64 | tr -d '\n')
      && printf '{"auths":{"%s":{"auth":"%s"}}}' "${HARBOR_REGISTRY}" "$AUTH"
      > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}/${APP_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/${APP_DIR}/Dockerfile"
      --destination "${HARBOR_REGISTRY}/apps/${APP_NAME}:${CI_COMMIT_SHA}"
      --destination "${HARBOR_REGISTRY}/apps/${APP_NAME}:latest"
      --cache=true
      --cache-repo "${HARBOR_REGISTRY}/apps/${APP_NAME}/cache"
      --snapshot-mode=redo
  tags:
    - docker
    - kaniko
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - ${APP_DIR}/**/*

build-portal:
  extends: .kaniko-build
  variables:
    APP_NAME: portal
    APP_DIR: iac/apps/portal

build-jit-elevation:
  extends: .kaniko-build
  variables:
    APP_NAME: jit-elevation
    APP_DIR: iac/apps/jit-elevation

build-cluster-setup:
  extends: .kaniko-build
  variables:
    APP_NAME: cluster-setup
    APP_DIR: iac/apps/cluster-setup

build-architecture:
  extends: .kaniko-build
  variables:
    APP_NAME: architecture
    APP_DIR: iac/apps/architecture

build-openclaw:
  extends: .kaniko-build
  variables:
    APP_NAME: openclaw
    APP_DIR: iac/apps/openclaw

# --- Container scanning ---
# Disable the default container_scanning job (requires CI_REGISTRY_IMAGE
# which doesn't exist since we use Harbor, not GitLab's registry).
# Override with per-app jobs that set CS_IMAGE explicitly.
container_scanning:
  rules:
    - when: never

.container-scan:
  stage: test
  image:
    name: registry.gitlab.com/security-products/container-scanning:8
    entrypoint: [""]
  variables:
    GIT_STRATEGY: none
    CS_REGISTRY_USER: ${HARBOR_PUSH_USER}
    CS_REGISTRY_PASSWORD: ${HARBOR_PUSH_PASSWORD}
  script:
    - gtcs scan
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
      cyclonedx: "**/gl-sbom-*.cdx.json"
    paths:
      - gl-container-scanning-report.json
    when: always
  tags:
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - ${APP_DIR}/**/*

scan-portal:
  extends: .container-scan
  variables:
    CS_IMAGE: ${HARBOR_REGISTRY}/apps/portal:latest
    APP_DIR: iac/apps/portal

scan-jit-elevation:
  extends: .container-scan
  variables:
    CS_IMAGE: ${HARBOR_REGISTRY}/apps/jit-elevation:latest
    APP_DIR: iac/apps/jit-elevation

scan-cluster-setup:
  extends: .container-scan
  variables:
    CS_IMAGE: ${HARBOR_REGISTRY}/apps/cluster-setup:latest
    APP_DIR: iac/apps/cluster-setup

scan-architecture:
  extends: .container-scan
  variables:
    CS_IMAGE: ${HARBOR_REGISTRY}/apps/architecture:latest
    APP_DIR: iac/apps/architecture

scan-openclaw:
  extends: .container-scan
  variables:
    CS_IMAGE: ${HARBOR_REGISTRY}/apps/openclaw:latest
    APP_DIR: iac/apps/openclaw

# --- SBOM upload to Dependency-Track ---
# Uploads CycloneDX SBOMs from container scanning to Dependency-Track.
# Required CI variables:
#   DT_API_KEY  - Dependency-Track API key (masked)
#   DT_URL      - Dependency-Track API URL (e.g., https://dtrack.kss.example.com)

.sbom-upload:
  stage: sbom-upload
  image:
    name: ${HARBOR_REGISTRY}/docker.io/curlimages/curl:latest
    entrypoint: [""]
  script:
    - |
      for sbom in $(find . -name "gl-sbom-*.cdx.json" 2>/dev/null); do
        echo "Uploading $sbom to Dependency-Track as ${APP_NAME}..."
        ENCODED=$(base64 -w0 "$sbom")
        curl -sf -X PUT "${DT_URL}/api/v1/bom" \
          -H "X-Api-Key: ${DT_API_KEY}" \
          -H "Content-Type: application/json" \
          -d "{\"projectName\": \"${APP_NAME}\", \"projectVersion\": \"${CI_COMMIT_SHORT_SHA}\", \"autoCreate\": true, \"bom\": \"${ENCODED}\"}"
        echo " OK"
      done
  tags:
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $DT_API_KEY != null'
      changes:
        - ${APP_DIR}/**/*

upload-sbom-portal:
  extends: .sbom-upload
  needs: ["scan-portal"]
  variables:
    APP_NAME: portal
    APP_DIR: iac/apps/portal

upload-sbom-jit-elevation:
  extends: .sbom-upload
  needs: ["scan-jit-elevation"]
  variables:
    APP_NAME: jit-elevation
    APP_DIR: iac/apps/jit-elevation

upload-sbom-cluster-setup:
  extends: .sbom-upload
  needs: ["scan-cluster-setup"]
  variables:
    APP_NAME: cluster-setup
    APP_DIR: iac/apps/cluster-setup

upload-sbom-architecture:
  extends: .sbom-upload
  needs: ["scan-architecture"]
  variables:
    APP_NAME: architecture
    APP_DIR: iac/apps/architecture

upload-sbom-openclaw:
  extends: .sbom-upload
  needs: ["scan-openclaw"]
  variables:
    APP_NAME: openclaw
    APP_DIR: iac/apps/openclaw

# --- NixOS VM SBOM (scheduled pipeline) ---
# Generates SBOM for support VM NixOS packages and uploads to Dependency-Track.
# Runs on schedule only (configure weekly in GitLab CI/CD > Schedules).
nixos-sbom:
  stage: sbom-upload
  image:
    name: ${HARBOR_REGISTRY}/docker.io/anchore/syft:latest
    entrypoint: [""]
  script:
    - |
      echo "Generating SBOM for NixOS support VM..."
      syft dir:/run/current-system -o cyclonedx-json > nixos-sbom.cdx.json
      echo "Uploading to Dependency-Track..."
      ENCODED=$(base64 -w0 nixos-sbom.cdx.json)
      apk add --no-cache curl 2>/dev/null || true
      curl -sf -X PUT "${DT_URL}/api/v1/bom" \
        -H "X-Api-Key: ${DT_API_KEY}" \
        -H "Content-Type: application/json" \
        -d "{\"projectName\": \"support-vm-nixos\", \"projectVersion\": \"$(date +%Y%m%d)\", \"autoCreate\": true, \"bom\": \"${ENCODED}\"}"
      echo " OK"
  tags:
    - docker
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $DT_API_KEY != null'
